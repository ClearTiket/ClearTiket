<!DOCTYPE html>

<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>클리어티켓 - 아이디 찾기 결과</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>
<main>
    <div class="auth-page fade-in">
        <a th:href="@{/login}" class="auth-logo">
            <img th:src="@{/images/logo.png}" alt="클리어티켓" style="height:48px;"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <span style="display:none;font-size:28px;font-weight:800;color:#4B6EF5;align-items:center;">클리어티켓</span>
        </a>
        <div class="auth-card">
            <p style="font-size:15px;color:#333;margin-bottom:24px;line-height:1.7;">
                입력하신 이메일로 가입한 아이디는
                <strong style="color:#4B6EF5;" th:text="${userId}">hong**3</strong>입니다.
            </p>
            <div style="display:flex;gap:12px;">
                <a th:href="@{/find-password}" class="btn btn-outline-gray" style="flex:1;text-align:center;">비밀번호 찾기</a>
                <a th:href="@{/login}" class="btn btn-primary" style="flex:1;text-align:center;">로그인</a>
            </div>
        </div>
    </div>
</main>
<th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>
</html>
