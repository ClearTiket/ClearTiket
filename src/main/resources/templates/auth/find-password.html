<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>클리어티켓 - 비밀번호 찾기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        .status-badge {
            display: none; font-size: 12px; font-weight: 600;
            padding: 3px 10px; border-radius: 20px; margin-top: 6px;
        }
        .status-badge.ok  { display: inline-block; background: #E8F5E9; color: #2E7D32; }
        .status-badge.err { display: inline-block; background: #FFEBEE; color: #C62828; }
        .tab-group { display: flex; gap: 0; margin-bottom: 20px; border: 1.5px solid #E2E4F0; border-radius: 10px; overflow: hidden; }
        .tab-btn {
            flex: 1; padding: 10px; border: none; background: #fff;
            font-size: 13px; font-weight: 600; color: #9999BB;
            font-family: inherit; cursor: pointer; transition: all .15s;
        }
        .tab-btn.active { background: #4B6EF5; color: #fff; }
        #code-section { display: none; }
    </style>
</head>
<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>
<main>
    <div class="auth-page fade-in">
        <a th:href="@{/login}" class="auth-logo">
            <img th:src="@{/images/logo.png}" alt="클리어티켓" style="height:48px;"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <span style="display:none;font-size:28px;font-weight:800;color:#4B6EF5;align-items:center;">클리어티켓</span>
        </a>
        <div class="auth-card">

            <!-- 본인확인 탭 -->
            <div class="tab-group">
                <button type="button" class="tab-btn active" id="tab-name" onclick="switchTab('name')">이름으로 찾기</button>
                <button type="button" class="tab-btn" id="tab-phone" onclick="switchTab('phone')">전화번호로 찾기</button>
            </div>

            <!-- 이메일 -->
            <div class="form-group">
                <label class="form-label">가입한 이메일을 입력해주세요.</label>
                <input type="email" class="form-input" id="fp-email" placeholder="이메일">
            </div>

            <!-- 이름 입력 (기본 노출) -->
            <div class="form-group" id="verify-name-group">
                <label class="form-label">가입 시 입력한 이름을 입력해주세요.</label>
                <input type="text" class="form-input" id="fp-name" placeholder="이름">
            </div>

            <!-- 전화번호 입력 (숨김) -->
            <div class="form-group" id="verify-phone-group" style="display:none;">
                <label class="form-label">가입 시 입력한 전화번호를 입력해주세요.</label>
                <input type="tel" class="form-input" id="fp-phone" placeholder="010-0000-0000" oninput="formatPhone(this)">
            </div>

            <span class="status-badge" id="verify-status"></span>

            <button type="button" class="btn btn-primary btn-full"
                    style="margin-top:16px;margin-bottom:20px;"
                    onclick="sendResetCode()">인증번호 발송</button>

            <!-- 인증번호 입력 -->
            <div id="code-section">
                <div class="form-group">
                    <label class="form-label">입력한 메일로 발송된 인증번호를 입력해주세요.</label>
                    <div style="display:flex;gap:8px;">
                        <input type="text" class="form-input" id="fp-code"
                               placeholder="인증번호 6자리" maxlength="6" style="flex:1;">
                        <button type="button" class="btn btn-primary btn-sm"
                                onclick="verifyResetCode()">확인</button>
                    </div>
                    <p id="code-timer" style="font-size:12px;color:#F44336;margin-top:6px;display:none;"></p>
                    <span class="status-badge" id="code-status"></span>
                </div>
            </div>

        </div>
    </div>
</main>
<th:block th:replace="~{fragments/footer :: footer}"></th:block>
<script th:inline="javascript">
    let timerInterval = null;
    let currentTab = 'name';

    function switchTab(tab) {
        currentTab = tab;
        document.getElementById('tab-name').classList.toggle('active', tab === 'name');
        document.getElementById('tab-phone').classList.toggle('active', tab === 'phone');
        document.getElementById('verify-name-group').style.display  = tab === 'name'  ? '' : 'none';
        document.getElementById('verify-phone-group').style.display = tab === 'phone' ? '' : 'none';
        setVerifyStatus('', '');
        document.getElementById('code-section').style.display = 'none';
        clearTimer();
    }

    async function sendResetCode() {
        const email       = document.getElementById('fp-email').value.trim();
        const verifyValue = currentTab === 'name'
            ? document.getElementById('fp-name').value.trim()
            : document.getElementById('fp-phone').value.trim();

        if (!email) { alert('이메일을 입력해 주세요.'); return; }
        if (!verifyValue) {
            alert(currentTab === 'name' ? '이름을 입력해 주세요.' : '전화번호를 입력해 주세요.');
            return;
        }

        try {
            const res  = await fetch('/api/auth/send-reset-code', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, verifyType: currentTab, verifyValue })
            });
            const data = await res.json();
            if (data.success) {
                setVerifyStatus('인증번호가 발송되었습니다. (5분 이내 입력)', 'ok');
                document.getElementById('code-section').style.display = 'block';
                startTimer(300);
            } else {
                setVerifyStatus(data.message ?? '정보가 일치하지 않습니다.', 'err');
            }
        } catch {
            setVerifyStatus('서버 오류가 발생했습니다.', 'err');
        }
    }

    async function verifyResetCode() {
        const email = document.getElementById('fp-email').value.trim();
        const code  = document.getElementById('fp-code').value.trim();
        if (!code) { alert('인증번호를 입력해 주세요.'); return; }

        try {
            const res  = await fetch('/api/auth/verify-reset-code', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, code })
            });
            const data = await res.json();
            if (data.verified) {
                setCodeStatus('인증 완료! 비밀번호 재설정 페이지로 이동합니다.', 'ok');
                clearTimer();
                document.getElementById('fp-code').disabled = true;
                setTimeout(() => {
                    location.href = /*[[@{/reset-password}]]*/ '/reset-password';
                }, 1000);
            } else {
                setCodeStatus(data.message ?? '인증번호가 일치하지 않습니다.', 'err');
            }
        } catch {
            setCodeStatus('서버 오류가 발생했습니다.', 'err');
        }
    }

    function setVerifyStatus(msg, type) {
        const el = document.getElementById('verify-status');
        el.textContent = msg;
        el.className = 'status-badge' + (type ? ' ' + type : '');
    }
    function setCodeStatus(msg, type) {
        const el = document.getElementById('code-status');
        el.textContent = msg;
        el.className = 'status-badge' + (type ? ' ' + type : '');
    }
    function formatPhone(el) {
        let v = el.value.replace(/\D/g, '');
        if      (v.length <= 3) el.value = v;
        else if (v.length <= 7) el.value = v.slice(0,3) + '-' + v.slice(3);
        else                    el.value = v.slice(0,3) + '-' + v.slice(3,7) + '-' + v.slice(7,11);
    }
    function startTimer(seconds) {
        clearTimer();
        const timerEl = document.getElementById('code-timer');
        timerEl.style.display = 'block';
        let remaining = seconds;
        timerInterval = setInterval(() => {
            const m = String(Math.floor(remaining / 60)).padStart(2, '0');
            const s = String(remaining % 60).padStart(2, '0');
            timerEl.textContent = `남은 시간: ${m}:${s}`;
            if (--remaining < 0) {
                clearTimer();
                timerEl.textContent = '인증번호가 만료되었습니다. 다시 시도해 주세요.';
                timerEl.style.color = '#F44336';
            }
        }, 1000);
    }
    function clearTimer() {
        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        const timerEl = document.getElementById('code-timer');
        if (timerEl) timerEl.style.display = 'none';
    }
</script>
</body>
</html>
