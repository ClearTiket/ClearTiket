<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>클리어티켓 - 비밀번호 재설정</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>
<main>
    <div class="auth-page fade-in">
        <a th:href="@{/login}" class="auth-logo">
            <img th:src="@{/images/logo.png}" alt="클리어티켓" style="height:48px;"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <span style="display:none;font-size:28px;font-weight:800;color:#4B6EF5;align-items:center;">클리어티켓</span>
        </a>
        <div class="auth-card">
            <!-- 완료 상태 -->
            <th:block th:if="${step == 'complete'}">
                <p style="font-size:15px;color:#333;margin-bottom:24px;">비밀번호 재설정이 완료되었습니다.</p>
                <a th:href="@{/login}" class="btn btn-primary btn-full" style="display:flex;">로그인 페이지로 이동</a>
            </th:block>

            <!-- 폼 상태 -->
            <th:block th:unless="${step == 'complete'}">
                <form th:action="@{/reset-password}" method="post">
                    <input type="hidden" name="email" th:value="${email}">
                    <p class="error-msg" th:if="${error != null}" th:text="${error}" style="display:block;margin-bottom:16px;"></p>
                    <div class="form-group">
                        <label class="form-label">새로운 비밀번호를 입력해주세요.</label>
                        <div style="position:relative;">
                            <input type="password" class="form-input" id="pw_input" name="password"
                                   placeholder="새 비밀번호" oninput="validatePw()">
                            <button type="button" id="pw_toggle_btn" onclick="togglePw('pw_input', this)"
                                    style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9999BB;padding:0;display:flex;align-items:center;">
                                <svg class="icon-eye" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                                <svg class="icon-eye-off" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                                    <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
                                    <line x1="1" y1="1" x2="23" y2="23"/>
                                </svg>
                            </button>
                        </div>
                        <p class="error-msg" id="pw_error" style="display:none;">비밀번호는 8~20자의 영문 대/소문자와 숫자, 특수문자를 조합해야 합니다.</p>
                    </div>
                    <div class="form-group">
                        <label class="form-label">비밀번호 확인</label>
                        <div style="position:relative;">
                            <input type="password" class="form-input" id="pw2_input"
                                   placeholder="비밀번호 재입력" oninput="validatePw()">
                            <button type="button" id="pw2_toggle_btn" onclick="togglePw('pw2_input', this)"
                                    style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9999BB;padding:0;display:flex;align-items:center;">
                                <svg class="icon-eye" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                                <svg class="icon-eye-off" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                                    <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
                                    <line x1="1" y1="1" x2="23" y2="23"/>
                                </svg>
                            </button>
                        </div>
                        <p class="error-msg" id="pw2_error" style="display:none;">비밀번호가 일치하지 않습니다.</p>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">비밀번호 재설정</button>
                </form>
                <div style="display:flex;gap:16px;justify-content:center;margin-top:20px;font-size:13px;">
                    <a th:href="@{/login}" style="color:var(--primary);text-decoration:none;font-weight:500;">로그인</a>
                    <span style="color:var(--border);">|</span>
                    <a th:href="@{/find-id}" style="color:var(--primary);text-decoration:none;font-weight:500;">이메일 찾기</a>
                    <span style="color:var(--border);">|</span>
                    <a th:href="@{/find-password}" style="color:var(--primary);text-decoration:none;font-weight:500;">비밀번호 찾기</a>
                    <span style="color:var(--border);">|</span>
                    <a th:href="@{/register}" style="color:var(--primary);text-decoration:none;font-weight:500;">회원가입</a>
                </div>
            </th:block>
        </div>
    </div>
</main>
<th:block th:replace="~{fragments/footer :: footer}"></th:block>
<script>
    function togglePw(id, btn){
        const el=document.getElementById(id);
        const hidden = el.type==='password';
        el.type = hidden ? 'text' : 'password';
        btn.querySelector('.icon-eye').style.display = hidden ? 'none' : '';
        btn.querySelector('.icon-eye-off').style.display = hidden ? '' : 'none';
    }
    function validatePw(){
        const pw=document.getElementById('pw_input').value;
        const pw2=document.getElementById('pw2_input').value;
        const ok=/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,20}$/.test(pw);
        document.getElementById('pw_error').style.display=(!ok&&pw)?'block':'none';
        if(pw2){ document.getElementById('pw2_error').style.display=(pw!==pw2)?'block':'none'; }
    }
</script>
</body>
</html>
