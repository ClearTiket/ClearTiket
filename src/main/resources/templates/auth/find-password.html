<!DOCTYPE html>

<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>클리어티켓 - 비밀번호 찾기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>
<main>
    <div class="auth-page fade-in">
        <a th:href="@{/login}" class="auth-logo">
            <img th:src="@{/images/logo.png}" alt="클리어티켓" style="height:48px;"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <span style="display:none;font-size:28px;font-weight:800;color:#4B6EF5;align-items:center;">클리어티켓</span>
        </a>
        <div class="auth-card">
            <div class="form-group">
                <label class="form-label">아이디를 입력해주세요.</label>
                <input type="text" class="form-input" placeholder="아이디">
                <p class="error-msg" style="display:none;">일치하는 아이디 정보가 없습니다.</p>
            </div>
            <div class="form-group">
                <label class="form-label">가입 시 입력했던 이메일을 입력해주세요.</label>
                <input type="email" class="form-input" placeholder="이메일">
                <p class="error-msg" style="display:none;">일치하는 이메일 정보가 없습니다.</p>
            </div>
            <button type="button" class="btn btn-primary btn-full" onclick="sendCode()" style="margin-bottom:20px;">인증번호 발송</button>
            <div class="form-group">
                <label class="form-label">입력한 메일로 발송된 인증번호를 입력해주세요.</label>
                <input type="text" class="form-input" placeholder="인증번호">
                <p class="error-msg" style="display:none;">인증번호가 일치하지 않습니다.</p>
            </div>
            <a th:href="@{/reset-password}" class="btn btn-primary btn-full" style="display:flex;">인증번호 확인</a>
        </div>
    </div>
</main>
<th:block th:replace="~{fragments/footer :: footer}"></th:block>
<script>function sendCode(){ alert('인증번호가 발송되었습니다. (UI 데모)'); }</script>
</body>
</html>
