<!DOCTYPE html>

<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>클리어티켓 - 회원가입</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>
<main>
    <div class="auth-page fade-in">
        <a th:href="@{/login}" class="auth-logo">
            <img th:src="@{/images/logo.png}" alt="클리어티켓" style="height:48px;"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <span style="display:none;font-size:28px;font-weight:800;color:#4B6EF5;align-items:center;">클리어티켓</span>
        </a>

        <div class="auth-card">
            <form th:action="@{/register}" method="post">
                <!-- 아이디 -->
                <div class="form-group">
                    <div class="field-wrap">
                        <span class="field-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                            </svg>
                        </span>
                        <input type="text" class="form-input with-icon" id="id_input" name="userId"
                               placeholder="아이디 (4~15자의 영소문자, 숫자)" oninput="validateId(this)">
                    </div>
                    <p class="error-msg" id="id_error" style="display:none;">4~15자의 영소문자와 숫자만 사용 가능합니다.</p>
                </div>

                <!-- 비밀번호 -->
                <div class="form-group">
                    <div class="field-wrap">
                        <span class="field-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                        </span>
                        <input type="password" class="form-input with-icon-both" id="pw_input" name="password"
                               placeholder="비밀번호 (8~20자, 대/소문자·숫자·특수문자 조합)" oninput="validatePw()">
                        <button type="button" class="eye-btn" onclick="togglePw('pw_input')">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <p class="error-msg" id="pw_error" style="display:none;">8~20자의 영문 대/소문자와 숫자, 특수문자를 조합해야 합니다.</p>
                </div>

                <!-- 비밀번호 확인 -->
                <div class="form-group">
                    <div class="field-wrap">
                        <span class="field-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                        </span>
                        <input type="password" class="form-input with-icon-both" id="pw2_input"
                               placeholder="비밀번호 재입력" oninput="validatePw()">
                        <button type="button" class="eye-btn" onclick="togglePw('pw2_input')">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <p class="error-msg" id="pw2_error" style="display:none;">비밀번호가 일치하지 않습니다.</p>
                </div>

                <!-- 이름 -->
                <div class="form-group">
                    <div class="field-wrap">
                        <span class="field-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                            </svg>
                        </span>
                        <input type="text" class="form-input with-icon" name="name" placeholder="이름">
                    </div>
                </div>

                <!-- 생년월일 -->
                <div class="form-group">
                    <div class="field-wrap">
                        <span class="field-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                            </svg>
                        </span>
                        <input type="text" class="form-input with-icon" name="birthdate" placeholder="생년월일 (예: 19900101)">
                    </div>
                </div>

                <!-- 전화번호 -->
                <div class="form-group">
                    <div class="field-wrap">
                        <span class="field-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.62 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.18 6.18l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
                            </svg>
                        </span>
                        <input type="tel" class="form-input with-icon" id="phone_input" name="phone"
                               placeholder="전화번호 (예: 010-1234-5678)" oninput="formatPhone(this)">
                    </div>
                    <p class="error-msg" id="phone_error" style="display:none;">올바른 전화번호 형식을 입력해주세요.</p>
                </div>

                <!-- 이메일 + 인증번호 -->
                <div class="form-group">
                    <div class="input-row">
                        <div class="field-wrap" style="flex:1;">
                            <span class="field-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
                                </svg>
                            </span>
                            <input type="email" class="form-input with-icon" id="email_input" name="email" placeholder="이메일">
                        </div>
                        <button type="button" class="btn btn-primary btn-sm" onclick="sendCode()">인증번호 발송</button>
                    </div>
                </div>

                <!-- 인증번호 확인 -->
                <div class="form-group">
                    <div class="input-row">
                        <div class="field-wrap" style="flex:1;">
                            <span class="field-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                </svg>
                            </span>
                            <input type="text" class="form-input with-icon" id="code_input" placeholder="인증번호 6자리 입력">
                        </div>
                        <button type="button" class="btn btn-primary btn-sm" onclick="verifyCode()">확인</button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-full">가입하기</button>
                <p style="text-align:center;margin-top:16px;font-size:13px;color:#9999BB;">
                    이미 계정이 있으신가요? <a th:href="@{/login}" style="color:#4B6EF5;font-weight:600;">로그인</a>
                </p>
            </form>
        </div>
    </div>
</main>
<th:block th:replace="~{fragments/footer :: footer}"></th:block>

<script>
    function togglePw(id) { const el=document.getElementById(id); el.type=el.type==='password'?'text':'password'; }
    function validateId(el) {
        const ok=/^[a-z0-9]{4,15}$/.test(el.value);
        el.classList.toggle('error', !ok && el.value.length>0);
        document.getElementById('id_error').style.display=(!ok && el.value.length>0)?'block':'none';
    }
    function validatePw() {
        const pw=document.getElementById('pw_input').value;
        const pw2=document.getElementById('pw2_input').value;
        const ok=/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,20}$/.test(pw);
        document.getElementById('pw_error').style.display=(!ok&&pw)?'block':'none';
        document.getElementById('pw_input').classList.toggle('error',!ok&&pw.length>0);
        if(pw2){ const m=pw===pw2; document.getElementById('pw2_error').style.display=!m?'block':'none'; document.getElementById('pw2_input').classList.toggle('error',!m); }
    }
    function formatPhone(el) {
        let v=el.value.replace(/\D/g,'');
        if(v.length<=3) el.value=v;
        else if(v.length<=7) el.value=v.slice(0,3)+'-'+v.slice(3);
        else el.value=v.slice(0,3)+'-'+v.slice(3,7)+'-'+v.slice(7,11);
        const ok=/^01[0-9]-\d{3,4}-\d{4}$/.test(el.value);
        const hasVal=el.value.length>0;
        el.classList.toggle('error',!ok&&hasVal);
        document.getElementById('phone_error').style.display=(!ok&&hasVal)?'block':'none';
    }
    function sendCode(){ alert('인증번호가 발송되었습니다. (UI 데모)'); }
    function verifyCode(){ alert('인증 완료 (UI 데모)'); }
</script>
</body>
</html>
