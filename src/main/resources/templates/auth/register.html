<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>클리어티켓 - 회원가입</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>

<main>
    <div class="register-page fade-in">
        <h2 style="font-size:22px;font-weight:800;color:var(--text-main);margin-bottom:24px;">회원가입</h2>

        <div class="register-card">

            <p th:if="${error != null}" class="r-msg err"
               th:text="${error}" style="display:block;margin-bottom:12px;font-size:13px;"></p>

            <form th:action="@{/register}" method="post" id="register-form">

                <div class="r-field">
                    <span class="r-field-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </span>
                    <div class="r-input-with-btn">
                        <input type="email" class="r-input" id="email_input"
                               name="email" placeholder="아이디 (이메일)"
                               oninput="onEmailInput()">
                        <button type="button" class="r-inline-btn"
                                id="btn-send-code" onclick="handleEmailBtn()">인증번호 발송
                        </button>
                    </div>
                </div>
                <p class="r-msg" id="email-msg"></p>

                <div class="code-section" id="reg-code-section">
                    <div class="r-field">
                        <span class="r-field-icon">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"/>
                                <polyline points="12 6 12 12 16 14"/>
                            </svg>
                        </span>
                        <div class="r-input-with-btn">
                            <input type="text" class="r-input" id="code_input"
                                   placeholder="인증번호 6자리 입력" maxlength="6">
                            <button type="button" class="r-inline-btn"
                                    onclick="verifyCode()">확인
                            </button>
                        </div>
                    </div>
                    <p class="code-timer" id="code-timer"></p>
                    <p class="r-msg" id="code-msg"></p>
                </div>

                <div class="r-divider"></div>

                <div class="r-field">
                    <span class="r-field-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </span>
                    <input type="password" class="r-input r-input-pr" id="pw_input"
                           name="password"
                           placeholder="비밀번호 (8~20자, 대/소문자·숫자·특수문자 조합)"
                           oninput="validatePw()">
                    <button type="button" class="eye-btn" onclick="togglePw('pw_input')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <p class="r-msg" id="pw-msg"></p>

                <div class="r-field">
                    <span class="r-field-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </span>
                    <input type="password" class="r-input r-input-pr" id="pw2_input"
                           name="passwordConfirm"
                           placeholder="비밀번호 재입력"
                           oninput="validatePw()">
                    <button type="button" class="eye-btn" onclick="togglePw('pw2_input')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <p class="r-msg" id="pw2-msg"></p>

                <div class="r-divider"></div>

                <div class="r-field">
                    <span class="r-field-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </span>
                    <input type="text" class="r-input" name="name" placeholder="이름">
                </div>

                <div class="r-field">
                    <span class="r-field-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                    </span>
                    <input type="text" class="r-input" name="birthdate"
                           placeholder="생년월일 (예) 20010101"
                           maxlength="8" oninput="this.value=this.value.replace(/\D/g,'')">
                </div>

                <!-- 주소 검색 (카카오 우편번호 API) -->
                <div class="r-field">
                    <span class="r-field-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                    </span>
                    <div class="r-input-with-btn">
                        <input type="text" class="r-input" id="zipcode_input"
                               name="zipcode" placeholder="우편번호" readonly>
                        <button type="button" class="r-inline-btn" onclick="openPostcode()">주소 검색</button>
                    </div>
                </div>
                <div class="r-field">
                    <span class="r-field-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                    </span>
                    <input type="text" class="r-input" id="addr1_input"
                           name="address" placeholder="기본 주소" readonly>
                </div>
                <div class="r-field">
                    <span class="r-field-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                    </span>
                    <input type="text" class="r-input" id="addr2_input"
                           name="addressDetail" placeholder="상세 주소 입력">
                </div>

                <div class="r-field">
                    <span class="r-field-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.62 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.18 6.18l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
                        </svg>
                    </span>
                    <div class="r-input-with-btn">
                        <input type="tel" class="r-input" id="phone_input"
                               name="phone"
                               placeholder="전화번호 (예) 010-1234-5678"
                               oninput="formatPhone(this)">
                        <button type="button" class="r-inline-btn"
                                id="btn-check-phone" onclick="checkPhone()">중복 확인
                        </button>
                    </div>
                </div>
                <p class="r-msg" id="phone-msg"></p>

                <button type="button" class="btn-register"
                        onclick="submitRegister()">가입하기
                </button>

            </form>

            <p class="login-link">
                이미 계정이 있으신가요?
                <a th:href="@{/login}">로그인</a>
            </p>
        </div>
    </div>
</main>
<th:block th:replace="~{fragments/footer :: footer}"></th:block>

<script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script>
    function openPostcode() {
        new daum.Postcode({
            oncomplete: function (data) {
                document.getElementById('zipcode_input').value = data.zonecode;
                document.getElementById('addr1_input').value =
                    data.userSelectedType === 'R' ? data.roadAddress : data.jibunAddress;
                document.getElementById('addr2_input').focus();
            }
        }).open();
    }

    let emailVerified = false;
    let emailCodeSent = false;
    let phoneAvailable = false;
    let timerInterval = null;

    // ── 이메일 입력 변경 시 상태 초기화
    function onEmailInput() {
        emailVerified = false;
        emailCodeSent = false;
        setMsg('email-msg', '', '');
        setMsg('code-msg', '', '');
        document.getElementById('reg-code-section').classList.remove('open');
        document.getElementById('email_input').classList.remove('ok', 'error');
        clearTimer();
        const btn = document.getElementById('btn-send-code');
        btn.textContent = '인증번호 발송';
        btn.disabled = false;
    }

    // ── 인증번호 발송 버튼 (중복확인 + 발송 통합)
    async function handleEmailBtn() {
        const email = document.getElementById('email_input').value.trim();
        if (!email) {
            setMsg('email-msg', '이메일을 입력해 주세요.', 'err');
            return;
        }
        if (!isValidEmail(email)) {
            setMsg('email-msg', '올바른 이메일 형식이 아닙니다.', 'err');
            return;
        }

        const btn = document.getElementById('btn-send-code');
        btn.disabled = true;
        btn.textContent = '확인 중...';

        // 중복 확인
        try {
            const res = await fetch('/api/auth/check-email', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email})
            });
            const data = await res.json();
            if (!data.available) {
                setMsg('email-msg', data.message ?? '이미 사용 중인 이메일입니다.', 'err');
                document.getElementById('email_input').classList.add('error');
                btn.disabled = false;
                btn.textContent = '인증번호 발송';
                return;
            }
        } catch {
            setMsg('email-msg', '서버 오류가 발생했습니다.', 'err');
            btn.disabled = false;
            btn.textContent = '인증번호 발송';
            return;
        }

        // 인증번호 발송
        btn.textContent = '발송 중...';
        try {
            const res = await fetch('/api/auth/send-code', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email})
            });
            const data = await res.json();
            if (data.success) {
                emailCodeSent = true;
                document.getElementById('email_input').classList.add('ok');
                setMsg('email-msg', '사용 가능한 이메일입니다.', 'ok');
                document.getElementById('reg-code-section').classList.add('open');
                setMsg('code-msg', '인증번호가 발송되었습니다. (5분 이내 입력)', 'ok');
                startTimer(300);
                btn.textContent = '재발송';
                btn.disabled = false;
            } else {
                setMsg('email-msg', data.message ?? '발송 실패', 'err');
                btn.disabled = false;
                btn.textContent = '인증번호 발송';
            }
        } catch {
            setMsg('code-msg', '발송 중 오류가 발생했습니다.', 'err');
            btn.disabled = false;
            btn.textContent = '인증번호 발송';
        }
    }

    async function verifyCode() {
        const email = document.getElementById('email_input').value.trim();
        const code = document.getElementById('code_input').value.trim();
        if (!code) {
            setMsg('code-msg', '인증번호를 입력해 주세요.', 'err');
            return;
        }

        try {
            const res = await fetch('/api/auth/verify-code', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email, code})
            });
            const data = await res.json();
            if (data.verified) {
                emailVerified = true;
                setMsg('code-msg', '인증이 완료되었습니다.', 'ok');
                document.getElementById('code_input').classList.add('ok');
                document.getElementById('code_input').disabled = true;
                clearTimer();
            } else {
                setMsg('code-msg', data.message ?? '인증번호가 일치하지 않습니다.', 'err');
                document.getElementById('code_input').classList.add('error');
            }
        } catch {
            setMsg('code-msg', '서버 오류가 발생했습니다.', 'err');
        }
    }

    async function checkPhone() {
        const phone = document.getElementById('phone_input').value.trim();
        if (!phone) {
            setMsg('phone-msg', '전화번호를 입력해 주세요.', 'err');
            return;
        }
        if (!/^01[0-9]-\d{3,4}-\d{4}$/.test(phone)) {
            setMsg('phone-msg', '올바른 전화번호 형식이 아닙니다.', 'err');
            return;
        }
        const btn = document.getElementById('btn-check-phone');
        btn.disabled = true;
        btn.textContent = '확인 중...';

        try {
            const res = await fetch('/api/auth/check-phone', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({phone})
            });
            const data = await res.json();
            if (data.available) {
                phoneAvailable = true;
                setMsg('phone-msg', '사용 가능한 번호입니다.', 'ok');
                document.getElementById('phone_input').classList.add('ok');
                btn.textContent = '확인완료';
            } else {
                phoneAvailable = false;
                setMsg('phone-msg', data.message ?? '이미 사용 중인 번호입니다.', 'err');
                document.getElementById('phone_input').classList.add('error');
                btn.disabled = false;
                btn.textContent = '중복 확인';
            }
        } catch {
            setMsg('phone-msg', '서버 오류가 발생했습니다.', 'err');
            btn.disabled = false;
            btn.textContent = '중복 확인';
        }
    }

    function submitRegister() {
        if (!emailVerified) {
            alert('이메일 인증을 완료해 주세요.');
            return;
        }
        if (!phoneAvailable) {
            alert('전화번호 중복확인을 완료해 주세요.');
            return;
        }
        const pw = document.getElementById('pw_input').value;
        const pw2 = document.getElementById('pw2_input').value;
        if (!/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,20}$/.test(pw)) {
            alert('비밀번호 형식을 확인해 주세요.');
            return;
        }
        if (pw !== pw2) {
            alert('비밀번호가 일치하지 않습니다.');
            return;
        }
        document.getElementById('register-form').submit();
    }

    function validatePw() {
        const pw = document.getElementById('pw_input').value;
        const pw2 = document.getElementById('pw2_input').value;
        const ok = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,20}$/.test(pw);
        if (pw) {
            setMsg('pw-msg', ok ? '' : '8~20자의 영문 대/소문자와 숫자, 특수문자를 조합해야 합니다.', ok ? '' : 'err');
            document.getElementById('pw_input').classList.toggle('error', !ok);
            document.getElementById('pw_input').classList.toggle('ok', ok);
        }
        if (pw2) {
            const match = pw === pw2;
            setMsg('pw2-msg', match ? '' : '비밀번호가 일치하지 않습니다.', match ? '' : 'err');
            document.getElementById('pw2_input').classList.toggle('error', !match);
            document.getElementById('pw2_input').classList.toggle('ok', match);
        }
    }

    function setMsg(id, msg, type) {
        const el = document.getElementById(id);
        el.textContent = msg;
        el.className = 'r-msg' + (type ? ' ' + type : '');
    }

    // 이메일 정규식 포맷 확인
    function isValidEmail(v) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
    }

    // 비밀번호 보이기/숨기기 토글
    function togglePw(id) {
        const el = document.getElementById(id);
        el.type = el.type === 'password' ? 'text' : 'password';
    }

    // 핸드폰 하이픈 자동포맷 및 상태 관리
    function formatPhone(el) {
        let v = el.value.replace(/\D/g, '');
        if (v.length <= 3) el.value = v;
        else if (v.length <= 7) el.value = v.slice(0, 3) + '-' + v.slice(3);
        else el.value = v.slice(0, 3) + '-' + v.slice(3, 7) + '-' + v.slice(7, 11);
        const ok = /^01[0-9]-\d{3,4}-\d{4}$/.test(el.value);
        el.classList.toggle('error', !ok && el.value.length > 0);
        el.classList.toggle('ok', ok);
        if (!ok) {
            phoneAvailable = false;
            setMsg('phone-msg', '', '');
        }
        const btn = document.getElementById('btn-check-phone');
        if (!ok) {
            btn.disabled = false;
            btn.textContent = '중복 확인';
        }
    }

    // 인증 타이머 작동 및 초기화
    function startTimer(seconds) {
        clearTimer();
        const timerEl = document.getElementById('code-timer');
        timerEl.style.display = 'block';
        let remaining = seconds;
        timerInterval = setInterval(() => {
            const m = String(Math.floor(remaining / 60)).padStart(2, '0');
            const s = String(remaining % 60).padStart(2, '0');
            timerEl.textContent = `남은 시간: ${m}:${s}`;
            if (--remaining < 0) {
                clearTimer();
                timerEl.textContent = '인증번호가 만료되었습니다. 재발송해 주세요.';
            }
        }, 1000);
    }

    function clearTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        const timerEl = document.getElementById('code-timer');
        if (timerEl) timerEl.style.display = 'none';
    }
</script>
</body>
</html>
