<!DOCTYPE html>

<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>클리어티켓 - 비밀번호 재설정</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>
<main>
    <div class="auth-page fade-in">
        <a th:href="@{/login}" class="auth-logo">
            <img th:src="@{/images/logo.png}" alt="클리어티켓" style="height:48px;"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <span style="display:none;font-size:28px;font-weight:800;color:#4B6EF5;align-items:center;">클리어티켓</span>
        </a>
        <div class="auth-card">
            <!-- 완료 상태 -->
            <th:block th:if="${step == 'complete'}">
                <p style="font-size:15px;color:#333;margin-bottom:24px;">비밀번호 재설정이 완료되었습니다.</p>
                <a th:href="@{/login}" class="btn btn-primary btn-full" style="display:flex;">로그인 페이지로 이동</a>
            </th:block>

            <!-- 폼 상태 -->
            <th:block th:unless="${step == 'complete'}">
                <div class="form-group">
                    <label class="form-label">새로운 비밀번호를 입력해주세요.</label>
                    <div style="position:relative;">
                        <input type="password" class="form-input" id="pw_input" placeholder="새 비밀번호" oninput="validatePw()">
                        <button type="button" onclick="togglePw('pw_input')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9999BB;">👁</button>
                    </div>
                    <p class="error-msg" id="pw_error" style="display:none;">비밀번호는 8~20자의 영문 대/소문자와 숫자, 특수문자를 조합해야 합니다.</p>
                </div>
                <div class="form-group">
                    <label class="form-label">비밀번호 확인</label>
                    <div style="position:relative;">
                        <input type="password" class="form-input" id="pw2_input" placeholder="비밀번호 재입력" oninput="validatePw()">
                        <button type="button" onclick="togglePw('pw2_input')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9999BB;">👁</button>
                    </div>
                    <p class="error-msg" id="pw2_error" style="display:none;">비밀번호가 일치하지 않습니다.</p>
                </div>
                <a th:href="@{/reset-password(step='complete')}" class="btn btn-primary btn-full" style="display:flex;">비밀번호 재설정</a>
            </th:block>
        </div>
    </div>
</main>
<th:block th:replace="~{fragments/footer :: footer}"></th:block>
<script>
    function togglePw(id){ const el=document.getElementById(id); el.type=el.type==='password'?'text':'password'; }
    function validatePw(){
        const pw=document.getElementById('pw_input').value;
        const pw2=document.getElementById('pw2_input').value;
        const ok=/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,20}$/.test(pw);
        document.getElementById('pw_error').style.display=(!ok&&pw)?'block':'none';
        if(pw2){ document.getElementById('pw2_error').style.display=(pw!==pw2)?'block':'none'; }
    }
</script>
</body>
</html>
