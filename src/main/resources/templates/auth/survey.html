<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>클리어티켓 - 취향 설문</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div class="survey-page">
    <div class="survey-logo">
        <img th:src="@{/images/logo.png}" alt="클리어티켓">
    </div>

    <div class="survey-greeting">
        <div class="name">
            <span th:text="${loginUser != null ? loginUser.name : '회원'}">홍길동</span>님 반가워요!
        </div>
        <div class="sub">질문에 답하고 맞춤 공연 추천을 받아보세요.</div>
    </div>

    <div class="survey-card">
        <div class="q-block">
            <div class="q-title">Q1. 어떤 장르의 공연을 좋아하시나요? <span>(최대 2개)</span></div>
            <div class="chip-group">
                <button class="chip" onclick="selectChip(this, 'q1', 2)">콘서트</button>
                <button class="chip" onclick="selectChip(this, 'q1', 2)">뮤지컬</button>
                <button class="chip" onclick="selectChip(this, 'q1', 2)">연극</button>
                <button class="chip" onclick="selectChip(this, 'q1', 2)">클래식</button>
                <button class="chip" onclick="selectChip(this, 'q1', 2)">무용/전통</button>
            </div>
        </div>

        <div class="q-block">
            <div class="q-title">Q2. 공연을 볼 때 가장 중요하게 생각하는 요소는? <span>(최대 1개)</span></div>
            <div class="chip-group">
                <button class="chip" onclick="selectChip(this, 'q2', 1)">라인업/배우</button>
                <button class="chip" onclick="selectChip(this, 'q2', 1)">스토리/작품성</button>
                <button class="chip" onclick="selectChip(this, 'q2', 1)">티켓 가격</button>
                <button class="chip" onclick="selectChip(this, 'q2', 1)">무대 연출/음악</button>
                <button class="chip" onclick="selectChip(this, 'q2', 1)">관람 후기</button>
            </div>
        </div>

        <div class="q-block">
            <div class="q-title">Q3. 주로 누구와 함께 관람하시나요? <span>(최대 1개)</span></div>
            <div class="chip-group">
                <button class="chip" onclick="selectChip(this, 'q3', 1)">혼자서 혼공!</button>
                <button class="chip" onclick="selectChip(this, 'q3', 1)">연인과 함께</button>
                <button class="chip" onclick="selectChip(this, 'q3', 1)">친구와 함께</button>
                <button class="chip" onclick="selectChip(this, 'q3', 1)">가족과 함께</button>
            </div>
        </div>

        <div class="skip-row">
            <button class="skip-link" th:onclick="|location.href='@{/logout}'|">다음에 할게요 Skip</button>
        </div>
    </div>

    <div class="survey-cta">
        <button class="btn-cta" id="cta-btn" onclick="goResult()">나에게 맞는 공연 보러 가기</button>
    </div>
</div>

<script th:inline="javascript">
    const state = { q1: [], q2: [], q3: [] };

    function selectChip(btn, group, max) {
        const isSelected = btn.classList.contains('selected');
        if (isSelected) {
            btn.classList.remove('selected');
            state[group] = state[group].filter(b => b !== btn);
        } else {
            if (state[group].length >= max) {
                state[group].shift().classList.remove('selected');
            }
            btn.classList.add('selected');
            state[group].push(btn);
        }
        updateCta();
    }

    function updateCta() {
        const ready = state.q1.length >= 1 && state.q2.length >= 1 && state.q3.length >= 1;
        document.getElementById('cta-btn').classList.toggle('ready', ready);
    }

    function goResult() {
        if (!document.getElementById('cta-btn').classList.contains('ready')) return;

        // 설문 결과 저장
        fetch(/*[[@{/survey}]]*/ '/survey', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                genres: state.q1.map(b => b.textContent.trim()),
                moods: state.q2.map(b => b.textContent.trim()),
                companion: state.q3.map(b => b.textContent.trim())[0] || ''
            })
        }).finally(() => {
            // 설문 끝나면 임시 세션 끊고 로그인 페이지로 이동
            location.href = /*[[@{/logout}]]*/ '/logout';
        });
    }
</script>
</body>
</html>
