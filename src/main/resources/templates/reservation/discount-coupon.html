<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>클리어티켓 - 할인쿠폰/등급선택</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        body { min-height: auto; height: 700px; overflow: hidden; background: var(--bg); }
        .popup-wrap { width: 1000px; height: 700px; margin: 0 auto; background: var(--white); display: flex; flex-direction: column; }
        .popup-header { padding: 24px 32px 0 32px; display: flex; justify-content: space-between; align-items: center; }
        .popup-body { flex: 1; display: flex; padding: 24px 32px; gap: 28px; overflow: hidden; }

        .side-section { width: 350px; display: flex; flex-direction: column; gap: 20px; }
        .main-section { flex: 1; display: flex; flex-direction: column; gap: 24px; }

        .select-card { background: transparent; border: none; padding: 0; }

        .btn-group { display: flex; gap: 12px; margin-top: auto; width: 100%; }
        .btn-prev { width: 140px; }
        .btn-next { flex: 1; height: 52px; font-size: 15px; font-weight: 700; }

        .coupon-list { display: flex; flex-direction: column; gap: 12px; margin-top: 12px; overflow-y: auto; flex: 1; }
        .coupon-item { display: flex; align-items: center; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: var(--radius); cursor: pointer; }
        .no-coupon-msg { text-align: center; padding: 40px 0; border: 1.5px solid var(--border); border-radius: var(--radius); color: var(--text-muted); font-size: 14px; }

        .chip-container { display: flex; gap: 10px; }
    </style>
</head>
<body>

<div class="popup-wrap">
    <header class="popup-header">
        <h1 class="section-title">할인쿠폰/등급선택</h1>
        <div class="tab-bar" style="width: 400px;">
            <button class="tab-btn active">01 할인/등급</button>
            <button class="tab-btn" style="pointer-events: none;">02 수령/주문자</button>
            <button class="tab-btn" style="pointer-events: none;">03 결제</button>
            <button class="tab-btn" style="pointer-events: none;">04 완료</button>
        </div>
    </header>

    <div class="popup-body">
        <div class="side-section">
            <div class="card">
                <div style="display: flex; gap: 16px; align-items: flex-start;">
                    <img th:src="${performance?.posterUrl}" class="img-placeholder" style="width: 90px; height: 120px;">
                    <div>
                        <h2 class="section-title" style="font-size: 15px; margin-bottom: 4px;" th:text="${performance?.title}"></h2>
                        <p style="font-size: 13px; color: var(--text-sub); margin-bottom: 2px;" th:text="|${performance?.startDate} ~ ${performance?.endDate}|"></p>
                        <p style="font-size: 13px; color: var(--text-muted);" th:text="${performance?.venue?.name}"></p>
                    </div>
                </div>
                <hr style="margin: 16px 0; border: 0; border-top: 1px solid var(--border);">
                <div style="display: flex; justify-content: space-between; font-size: 14px;">
                    <span th:text="|${seatGrade ?: ''} ${seatCount ?: 0}매|"></span>
                    <span th:text="|${#numbers.formatInteger(seatPriceSum ?: 0, 0, 'COMMA')} 원|"></span>
                </div>
            </div>

            <div class="card">
                <table class="fee-table">
                    <tr><td>상품금액</td><td th:text="|${#numbers.formatInteger(seatPriceSum ?: 0, 0, 'COMMA')} 원|"></td></tr>
                    <tr><td>할인금액</td><td id="sidebar-discount" style="color: var(--error);">0 원</td></tr>
                    <tr><td>배송비</td><td th:text="|${reservation?.shippingFee ?: 0} 원|"></td></tr>
                    <tr style="color: var(--primary); font-weight: 700;">
                        <td>총결제금액</td>
                        <td id="sidebar-total"
                            th:text="|${#numbers.formatInteger((seatPriceSum ?: 0) + (reservation?.shippingFee ?: 0), 0, 'COMMA')} 원|">
                        </td>
                    </tr>
                </table>
            </div>
        </div>

        <div class="main-section">
            <div class="select-card">
                <h3 class="section-title" style="font-size: 14px; margin-bottom: 12px;">등급선택</h3>
                <div class="chip-container">
                    <button type="button"
                            style="border-radius: 10px;"
                            th:each="grade : ${seatGradeList}"
                            class="s-chip"
                            th:classappend="${grade == seatGrade} ? 'selected' : (${seatGrade == null && gradeStat.index == 0} ? 'selected' : '')"
                            th:text="${grade}">
                            th:text="${grade}">
                    </button>
                </div>
            </div>

            <hr style="border: 0; border-top: 1px solid var(--border);">

            <div class="select-card" style="flex: 1; display: flex; flex-direction: column;">
                <h3 class="section-title" style="font-size: 14px; margin-bottom: 4px;">할인쿠폰선택</h3>
                <div id="coupon-container" class="coupon-list"></div>
            </div>

            <div class="btn-group">
                <a th:href="@{/reservations/seats}" class="btn btn-outline-gray btn-prev">이전</a>
                <button type="button" id="next-btn" class="btn btn-primary btn-next">다음단계</button>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const originalPrice = /*[[${seatPriceSum ?: 0}]]*/ 0;
    const shippingFee = /*[[${reservation?.shippingFee ?: 0}]]*/ 0;
    const gradeList = /*[[${seatGradeList}]]*/ [];
    const currentGrade = /*[[${seatGrade}]]*/ "";

    document.addEventListener("DOMContentLoaded", function() {
        loadCoupons();
    });

    function loadCoupons() {
        fetch('/api/coupons')
            .then(res => res.json())
            .then(list => {
                const container = document.getElementById('coupon-container');
                if (!list || list.length === 0) {
                    container.innerHTML = '<div class="no-coupon-msg">할인항목이 없습니다.</div>';
                    return;
                }
                list.forEach(c => {
                    const discount = c.discountAmount || 0;
                    const label = document.createElement('label');
                    label.className = 'coupon-item';
                    label.innerHTML = `
                        <input type="radio" name="couponSelect" value="${c.id}" data-discount="${discount}" onchange="calculateDiscount(this)">
                        <span>${c.name}</span>
                    `;
                    container.appendChild(label);
                });
            })
            .catch(err => {
                console.error("쿠폰 로딩 실패:", err);
            });
    }

    function calculateDiscount(radio) {
        const d = parseInt(radio.dataset.discount) || 0;
        document.getElementById('sidebar-discount').innerText = `-${d.toLocaleString()} 원`;
        document.getElementById('sidebar-total').innerText = `${(originalPrice - d + shippingFee).toLocaleString()} 원`;
    }
</script>
</body>
</html>
