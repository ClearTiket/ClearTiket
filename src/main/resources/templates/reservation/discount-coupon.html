<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>클리어티켓 - 할인쿠폰/등급선택</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">

    <style>
        /* [공통 CSS에 없는 팝업 규격 및 특수 레이아웃만 정의] */
        body {
            min-height: auto;
            height: 700px;
            overflow: hidden;
        }
        /* 1000x700 팝업 컨테이너 */
        .popup-wrap {
            width: 1000px;
            height: 700px;
            margin: 0 auto;
            background: var(--white);
            display: flex;
            flex-direction: column;
        }
        /* 상단 헤더 및 스텝 바 영역 */
        .popup-header {
            padding: 24px 32px 12px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .popup-body {
            flex: 1;
            display: flex;
            padding: 0 32px 32px 32px;
            gap: 28px;
            overflow: hidden;
        }
        /* 왼쪽 정보 섹션 고정 가로폭 */
        .side-info-section {
            width: 350px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        /* 오른쪽 메인 선택 섹션 */
        .main-select-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        /* 쿠폰 선택 라디오 커스텀 목록 */
        .coupon-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 12px;
        }
        .coupon-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            transition: all .2s;
        }
        .coupon-item:hover {
            border-color: var(--primary);
            background: var(--primary-light);
        }
        .coupon-item input[type="radio"] {
            accent-color: var(--primary);
            width: 18px;
            height: 18px;
            margin-right: 12px;
        }
        .coupon-info {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="popup-wrap fade-in">
    <header class="popup-header">
        <h1 class="section-title" style="margin-bottom: 0;">할인쿠폰/등급선택</h1>
        <div class="tab-bar" style="border-bottom: none; gap: 24px;">
            <span class="tab-btn active" style="padding: 0 0 4px 0; flex: none;">01 할인/등급</span>
            <span class="tab-btn" style="padding: 0 0 4px 0; flex: none; pointer-events: none;">02 수령/주문자</span>
            <span class="tab-btn" style="padding: 0 0 4px 0; flex: none; pointer-events: none;">03 결제</span>
            <span class="tab-btn" style="padding: 0 0 4px 0; flex: none; pointer-events: none;">04 완료</span>
        </div>
    </header>

    <div class="popup-body">

        <div class="side-info-section">
            <div class="card" style="padding: 20px;">
                <div style="display: flex; gap: 16px; align-items: flex-start;">
                    <img th:src="${performance.posterImageUrl}" alt="공연 포스터" class="img-placeholder" style="width: 90px; height: 120px; flex-shrink: 0; object-fit: cover; border: none;"/>
                    <div style="min-width: 0;">
                        <h2 th:text="${performance.title}" style="font-size: 15px; font-weight: 700; margin-bottom: 8px; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">BLUE HOUR : 청춘이 빛나는 우리들의 시간</h2>
                        <p th:text="${performance.dateStr}" style="font-size: 13px; color: var(--text-sub); margin-bottom: 4px;">2026.06.06 (토) 17:00</p>
                        <p th:text="${performance.venueName}" style="font-size: 13px; color: var(--text-muted);">KSPO DOME</p>
                    </div>
                </div>
                <hr style="border: none; border-top: 1px solid var(--border); margin: 16px 0;"/>
                <div style="display: flex; justify-content: space-between; font-size: 14px; font-weight: 500;">
                    <span th:text="|${reservation.seatGrade} 1매|">R석 1매</span>
                    <span th:text="|${#numbers.formatInteger(reservation.price, 0, 'COMMA')} 원|">154,000 원</span>
                </div>
            </div>

            <div class="card" style="padding: 20px; flex: 1;">
                <table class="fee-table" style="height: 100%;">
                    <tr>
                        <td>상품금액</td>
                        <td th:text="|${#numbers.formatInteger(reservation.price, 0, 'COMMA')} 원|">154,000 원</td>
                    </tr>
                    <tr>
                        <td>할인금액</td>
                        <td id="sidebar-discount" style="color: var(--error);">0 원</td>
                    </tr>
                    <tr>
                        <td>배송비</td>
                        <td>0 원</td>
                    </tr>
                    <tr>
                        <td style="padding-top: 16px;">총결제금액</td>
                        <td id="sidebar-total" style="padding-top: 16px; font-size: 18px;" th:text="|${#numbers.formatInteger(reservation.price, 0, 'COMMA')} 원|">154,000 원</td>
                    </tr>
                </table>
            </div>
        </div>

        <div class="main-content main-select-section">
            <div class="card" style="padding: 24px;">
                <h3 style="font-size: 14px; font-weight: 700; margin-bottom: 14px;">등급선택</h3>
                <div style="display: flex; gap: 10px;">
                    <button class="s-chip selected" th:text="${reservation.seatGrade}">R석</button>
                    <button class="s-chip" style="cursor: not-allowed; opacity: 0.4;" disabled>VIP석</button>
                </div>
            </div>

            <div class="card" style="padding: 24px; flex: 1; display: flex; flex-direction: column;">
                <h3 style="font-size: 14px; font-weight: 700; margin-bottom: 4px;">할인쿠폰선택</h3>

                <div th:if="${#lists.isEmpty(couponList)}" style="flex: 1; display: flex; align-items: center; justify-content: center; border: 1.5px solid var(--border); border-radius: var(--radius); margin-top: 12px; min-height: 120px;">
                    <p style="color: var(--text-muted); font-size: 14px;">할인항목이 없습니다.</p>
                </div>

                <div th:if="${!#lists.isEmpty(couponList)}" class="coupon-list">
                    <label class="coupon-item">
                        <input type="radio" name="couponSelect" value="0" data-discount="0" checked onchange="calculateDiscount(this)">
                        <div class="coupon-info">
                            <span class="coupon-name">적용 안 함</span>
                            <span style="font-weight: 600; color: var(--text-sub);">0 원</span>
                        </div>
                    </label>

                    <label class="coupon-item" th:each="coupon : ${couponList}">
                        <input type="radio" name="couponSelect" th:value="${coupon.id}" th:data-discount="${coupon.discountAmount}" onchange="calculateDiscount(this)">
                        <div class="coupon-info">
                            <span class="coupon-name" th:text="${coupon.name}">[첫 가입 회원] 10,000원 할인 쿠폰</span>
                            <span style="font-weight: 700; color: var(--primary);" th:text="|-${#numbers.formatInteger(coupon.discountAmount, 0, 'COMMA')} 원|">-10,000 원</span>
                        </div>
                    </label>
                </div>
            </div>

            <div style="margin-top: auto; display: flex; justify-content: flex-end;">
                <button type="button" class="btn btn-primary" style="width: 100%; max-width: 440px; height: 50px; font-size: 15px;">다음단계</button>
            </div>
        </div>

    </div>
</div>

<script th:inline="javascript">
    // 자바스크립트 연동용 원래 티켓 금액 세팅
    const originalPrice = /*[[${reservation.price}]]*/ 154000;

    // 라디오 버튼 선택 시 왼쪽 영수증 카드 실시간 수치 변경 함수
    function calculateDiscount(radio) {
        const discountAmount = parseInt(radio.getAttribute('data-discount')) || 0;
        const totalPrice = originalPrice - discountAmount;

        // 테이블 특정 항목 글자 갈아끼우기
        document.getElementById('sidebar-discount').innerText = `-${discountAmount.toLocaleString()} 원`;
        document.getElementById('sidebar-total').innerText = `${totalPrice.toLocaleString()} 원`;
    }
</script>
</body>
</html>
