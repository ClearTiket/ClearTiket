<!DOCTYPE html>

<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>클리어티켓 - 검색 결과</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">

    <!-- date picker cdn -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/jquery/latest/jquery.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/momentjs/latest/moment.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.min.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.css" />
</head>

<script>
    // 사용자가 날짜 선택기를 실제로 조작하기 전에는 null로 유지한다.
    // (예전 버그: 여기가 항상 "오늘"/"오늘+13일"로 채워져 있어서,
    //  재검색 버튼만 눌러도 그 좁은 날짜 범위 밖의 공연은 결과에서 전부 사라졌었음)
    let startDate = null;
    let endDate = null;
    let dateRangeSelected = false; // 사용자가 날짜를 실제로 골랐는지 여부

    function dateFormatter(date) {
        const y = date.getFullYear();
        const m = date.getMonth() + 1;
        const d = date.getDate();

        const mStr = m < 10 ? '0' + m : m;
        const dStr = d < 10 ? '0' + d : d;

        return "" + y + '-' + mStr + '-' + dStr;
    }

    $(function () {
        const today = new Date();
        const year = today.getFullYear();
        const month = today.getMonth() + 1;
        const day = today.getDate();
        const todayStr = year + '/' + month + '/' + day;

        const nextWeek = new Date(year, month - 1, day + 13);
        const nwYear = nextWeek.getFullYear();
        const nwMonth = nextWeek.getMonth() + 1;
        const nwDay = nextWeek.getDate();
        const nextWeekStr = nwYear + '/' + nwMonth + '/' + nwDay;

        // 달력 UI 자체의 초기 표시값(placeholder)일 뿐, 아직 필터에는 반영하지 않는다.
        $('.date-picker').daterangepicker({
            "autoApply": true,
            "locale": {
                "format": "YYYY-MM-DD",
                "separator": " ~ ",
                "applyLabel": "선택",
                "cancelLabel": "취소",
                "fromLabel": "부터",
                "toLabel": "까지",
                "customRangeLabel": "Custom",
                "weekLabel": "W",
                "daysOfWeek": [
                    "일",
                    "월",
                    "화",
                    "수",
                    "목",
                    "금",
                    "토"
                ],
                "monthNames": [
                    "1월",
                    "2월",
                    "3월",
                    "4월",
                    "5월",
                    "6월",
                    "7월",
                    "8월",
                    "9월",
                    "10월",
                    "11월",
                    "12월"
                ],
                "firstDay": 1
            },
            "linkedCalendars": true,
            "alwaysShowCalendars": true,
            "startDate": todayStr,
            "endDate": nextWeekStr,
            "opens": "center"
        }, function(start, end, label) {
            console.log('New date range selected: ' + start.format('YYYY-MM-DD') + ' to ' + end.format('YYYY-MM-DD') + ' (predefined range: ' + label + ')');
            // 사용자가 달력에서 실제로 날짜를 선택한 순간에만 값을 채우고 플래그를 켠다.
            startDate = dateFormatter(start._d);
            endDate = dateFormatter(end._d);
            dateRangeSelected = true;
        });
    });
</script>

<style>
    /* ===== 디자인 토큰 ===== */
    :root {
        --primary: #4154FF;
        --primary-hover: #3443CC;
        --primary-soft: #EEF0FF;
        --primary-soft-hover: #E1E5FF;
        --text-strong: #16181D;
        --text-body: #4B4F58;
        --text-muted: #8A8F98;
        --border-soft: #E7E9F0;
        --surface: #ffffff;
        --surface-muted: #F7F8FC;
        --radius-lg: 16px;
        --radius-md: 12px;
        --radius-sm: 999px;
        --shadow-card: 0 1px 2px rgba(16, 24, 40, 0.04), 0 1px 3px rgba(16, 24, 40, 0.06);
        --shadow-card-hover: 0 12px 24px -8px rgba(65, 84, 255, 0.18), 0 4px 8px rgba(16, 24, 40, 0.04);
        --transition: 180ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; }

    body {
        font-family: 'Noto Sans KR', sans-serif;
        margin: 0;
        padding: 0;
        background-color: var(--surface-muted);
        color: var(--text-body);
    }

    /* 전체 레이아웃 */
    .content-wrapper {
        max-width: 1200px;
        margin: 40px auto 80px;
        display: flex;
        gap: 28px;
        align-items: flex-start;
        padding: 0 20px;
    }

    /* 좌측 필터 사이드바 */
    .filter-sidebar {
        width: 300px;
        flex-shrink: 0;
        box-sizing: border-box;

        border: 1px solid var(--border-soft);
        border-radius: var(--radius-lg);

        padding: 24px;
        background-color: var(--surface);
        box-shadow: var(--shadow-card);
        position: sticky;
        top: 24px;
    }

    .filter-sidebar .filter-section:first-child {
        padding-top: 0;
    }

    .filter-section {
        padding: 14px 0;
    }

    .filter-sidebar h5 {
        font-size: 14px;
        letter-spacing: 0.2px;
        color: var(--text-strong);
        margin: 0 0 12px 0;
        font-weight: 700;
    }

    .filter-sidebar hr {
        border: none;
        border-top: 1px solid var(--border-soft);
        margin: 4px 0;
    }

    /* 필터 토글 버튼 그룹 */
    .toggle-group {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
    }

    .toggle-btn {
        width: auto;
        height: 34px;
        border: 1px solid var(--border-soft);
        border-radius: var(--radius-sm);
        background-color: var(--surface-muted);
        color: var(--text-body);
        padding: 0 14px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: background-color var(--transition), color var(--transition), border-color var(--transition), transform var(--transition);
    }

    .toggle-btn:hover {
        border-color: var(--primary);
        color: var(--primary);
        background-color: var(--primary-soft);
    }

    .toggle-btn:active {
        transform: scale(0.97);
    }

    .toggle-btn.active {
        background-color: var(--primary);
        border-color: var(--primary);
        color: #ffffff;
        box-shadow: 0 4px 10px -2px rgba(65, 84, 255, 0.45);
    }

    .date-picker {
        width: 100%;
        font-size: 14px;
        line-height: 1.5;
        color: var(--text-body);
        background-color: var(--surface);
        border: 1px solid var(--border-soft);
        border-radius: var(--radius-md);
        padding: 10px 12px;
        cursor: pointer;
        transition: border-color var(--transition);
    }

    .date-picker:hover,
    .date-picker:focus {
        border-color: var(--primary);
        outline: none;
    }

    .filter-section.re-search-section {
        display: flex;
        justify-content: stretch;
        padding-top: 20px;
    }

    .re-search {
        width: 100%;
        height: 48px;
        border: none;
        border-radius: var(--radius-md);
        background-color: var(--primary);
        color: #ffffff;

        font-weight: 700;

    }

    }

    }

    }

        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 15px;
        margin-bottom: 20px;
    }

    .sort-btn {
        height: 30px;
        border: none;
        background: none;
        font-size: 14px;
        color: var(--text-muted);

        padding: 0;
        font-weight: 500;
    }

    .sort-btn.active {

        font-weight: 700;
    }

    /* "혹시 ~ 라고 입력하신건가요?" 힌트 배너 */
    #search-hint {
        display: none;
        padding: 14px 20px;
        background: linear-gradient(90deg, var(--primary-soft), #F5F7FF);
        color: var(--primary-hover);
        margin: 0 0 20px 0;
        border-radius: var(--radius-md);
        font-size: 14.5px;
        font-weight: 500;
        border-left: 4px solid var(--primary);
    }

    #search-hint strong {
        color: var(--primary);
        font-weight: 700;
    }

    /* 검색 결과 없음 안내 */
    .empty-state {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 100px 20px;
        color: var(--text-muted);
        border: 1px dashed var(--border-soft);
        border-radius: var(--radius-lg);
        background-color: var(--surface);
    }

    .empty-state .empty-emoji {
        font-size: 40px;
        margin-bottom: 4px;
    }

    .empty-state .empty-title {
        font-size: 16px;
        font-weight: 700;
        color: var(--text-strong);
    }

    .empty-state .empty-desc {
        font-size: 13.5px;
        color: var(--text-muted);
    }

    /* 카드 그리드 */
    .card-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        row-gap: 28px;
        column-gap: 24px;
        width: 100%;
    }

    /* 개별 상품 카드 */
    .prod-card {
        height: 350px;
        border: 1px solid var(--border-soft);
        padding: 14px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        background-color: var(--surface);
        border-radius: var(--radius-md);
        text-decoration: none;
        box-shadow: var(--shadow-card);
        transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
    }

    .prod-card:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow-card-hover);
        border-color: #D6DBFF;
    }

    .card-img-wrapper {
        width: 100%;
        display: flex;
        justify-content: center;
        margin-bottom: 12px;
    }

    .card-img-placeholder {
        height: 220px;
        aspect-ratio: 3 / 4;
        background-color: #EEF1F6;
        color: #A5ABB8;
        font-size: 14px;
        font-weight: 600;
        border-radius: 8px;
        width: auto;
        overflow: hidden;
    }

    .card-img-placeholder img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 320ms ease;
    }

    .prod-card:hover .card-img-placeholder img {
        transform: scale(1.04);
    }

    .card-text-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        overflow: hidden;
    }

    .prod-title {
        margin: 0 0 6px 0;
        font-size: 15.5px;
        color: var(--text-strong);
        font-weight: 700;
        line-height: 1.35;

        white-space: normal;
        word-break: break-all;
        overflow-wrap: break-word;

        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    .prod-desc {
        margin: 0;
        font-size: 13px;
        color: var(--text-muted);
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    @media (max-width: 1000px) {
        .content-wrapper { flex-direction: column; }
        .filter-sidebar { width: 100%; position: static; }
        .card-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 560px) {
        .card-grid { grid-template-columns: 1fr; }
    }
</style>

<script>
    async function createCards(resultJson) {
        // card-grid 요소 선택
        const cardGrid = document.querySelector('.card-grid');
        const emptyState = document.querySelector('.empty-state');
        cardGrid.replaceChildren();

        // 결과가 없으면 빈 상태 안내를 보여준다.
        if (!resultJson || resultJson.length === 0) {
            emptyState.style.display = 'flex';
            return;
        }
        emptyState.style.display = 'none';

        // 데이터 반복 처리
        resultJson.forEach(item => {
            // prod-card 생성
            const prodCard = document.createElement('a');
            prodCard.classList.add('prod-card');
            prodCard.href = "/venue/" + item.performanceId + "/detail"

            // 이미지 영역
            const imgWrapper = document.createElement('div');
            imgWrapper.classList.add('card-img-wrapper');

            const imgPlaceholder = document.createElement('div');
            imgPlaceholder.classList.add('card-img-placeholder');

            const img = document.createElement('img');
            img.src = item.posterUrl;
            img.alt = item.title;

            imgPlaceholder.appendChild(img);
            imgWrapper.appendChild(imgPlaceholder);

            // 텍스트 영역
            const textArea = document.createElement('div');
            textArea.classList.add('card-text-area');

            const title = document.createElement('h4');
            title.classList.add('prod-title');
            title.textContent = item.title;

            const desc = document.createElement('p');
            desc.classList.add('prod-desc');
            desc.textContent = item.venueName;

            textArea.appendChild(title);
            textArea.appendChild(desc);

            // prod-card에 추가
            prodCard.appendChild(imgWrapper);
            prodCard.appendChild(textArea);

            // card-grid에 추가
            cardGrid.appendChild(prodCard);
        });
    }

    // 버그 수정: 예전에는 이 함수의 파라미터로만 최신 검색어를 받고,
    // 바깥 스코프의 전역 `keyword` 변수는 절대 갱신하지 않았다.
    // 그래서 헤더 검색창으로 새 검색어를 입력해도 "재검색" 버튼을 누르면
    // 여전히 "맨 처음 페이지에 들어왔을 때의 검색어"로 재검색되는 문제가 있었다.
    // 이제 검색이 실행될 때마다 전역 keyword를 같이 갱신한다.
    async function getSearchData(kw) {
        keyword = kw;
        document.querySelector(".search-wrap input").value = keyword;

        try {
            const fetchUrl = "/api/search/performance?keyword=" + encodeURIComponent(keyword);
            const response = await fetch(fetchUrl, {
                method: 'GET',
                headers: { "Content-Type": "application/json" }
            });

            const responseData = await response.json();
            const resultJson = responseData.results; // 진짜 검색 결과 리스트
            const correctedKeyword = responseData.correctedKeyword; // 교정된 단어

            // "혹시 ~라고 입력하신건가요?" 안내 문구 처리
            const hintArea = document.getElementById('search-hint');
            if (hintArea) {
                if (correctedKeyword && correctedKeyword !== keyword) {
                    hintArea.innerHTML = `?? 혹시 <strong>"${correctedKeyword}"</strong>라고 입력하신건가요?`;
                    hintArea.style.display = 'block';
                } else {
                    hintArea.style.display = 'none';
                }
            }

            await createCards(resultJson);

        } catch (err) {
            console.log(err);
        }
    }

    async function postSearchData(kw, jsonData) {
        try {
            // 버그 수정: keyword를 그대로 문자열 이어붙이기 하면 공백/특수문자(&, # 등)가
            // 포함된 검색어에서 쿼리스트링이 깨졌다. GET 쪽과 동일하게 인코딩한다.
            const fetchUrl = "/api/search/performance?keyword=" + encodeURIComponent(kw);
            const response = await fetch(fetchUrl, {
                method: 'POST',
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(jsonData)
            });

            const resultJson = await response.json();
            await createCards(resultJson);
        } catch (err) {
            console.log(err);
        }
    }

    window.getSearchData = getSearchData;

    // 페이지 처음 로드되었을 때 URL 파라미터 읽어서 검색 실행
    const urlParams = new URLSearchParams(window.location.search);
    let keyword = urlParams.get('keyword') || '';
    if (keyword) {
        if (keyword.includes('%')) {
            keyword = decodeURIComponent(keyword);
        }
        getSearchData(keyword);
    }

    // 브라우저 주소창(history.pushState)이 바뀌는 순간 실시간 감지
    window.addEventListener('popstate', () => {
        const freshParams = new URLSearchParams(window.location.search);
        let freshKeyword = freshParams.get('keyword');
        if (freshKeyword) {
            if (freshKeyword.includes('%')) {
                freshKeyword = decodeURIComponent(freshKeyword);
            }
            getSearchData(freshKeyword);
        }
    });

    const filterData = {
        "tagsGenre": [],
        "tagsVibe": [],
        "tagsWith": [],
        "statuses": ["ON_SALE", "PREPARING"],
        "regions": [],
        "startDate": null,
        "endDate": null
    }

    document.querySelectorAll(".toggle-btn").forEach(btn => {
        const key = btn.dataset.filter;
        btn.addEventListener('click', () => {
            btn.classList.toggle('active');
            const split = btn.dataset.tag.split(',');
            if (btn.classList.contains('active')) {
                filterData[key].push(...split);
            } else {
                filterData[key] = filterData[key].filter(item => !split.includes(item));
            }
        });
    });

    document.querySelector(".re-search").addEventListener('click', () => {
        // 사용자가 날짜 선택기를 실제로 조작했을 때만 날짜를 필터에 실어 보낸다.
        // 그렇지 않으면 null로 보내서, 서버 쪽에서 날짜 조건 없이 검색하도록 한다.
        filterData["startDate"] = dateRangeSelected ? startDate : null;
        filterData["endDate"] = dateRangeSelected ? endDate : null;
        // 재검색 시점에도 항상 "현재의" keyword(헤더에서 갱신됐을 수 있는 값)를 사용한다.
        postSearchData(keyword, filterData);
    });

</script>

</html>
