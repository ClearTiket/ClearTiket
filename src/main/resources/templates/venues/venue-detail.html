<!DOCTYPE html>

<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>클리어티켓 - 공연장</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=4e3af0b5c007e167ad4a72c776826ce1"></script>
</head>

<style>
    body {
        font-family: 'Noto Sans KR', sans-serif;
        margin: 0;
        padding: 0;
        background-color: #ffffff;
        color: #333;
    }

    .detail-container {
        width: 1200px;
        margin: 40px auto;
        display: flex;
        flex-direction: column;
        gap: 25px;
        box-sizing: border-box;
    }

    .info-card {
        width: 1200px;
        text-align: left;
        border: 2px solid #3971E7;
        border-radius: 25px;
        box-sizing: border-box;
        overflow: hidden;
        background-color: #ffffff;
    }

    .card-short {
        height: 200px;
        padding: 30px 40px;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .card-short h3 {
        margin: 0 0 15px 0;
        font-size: 24px;
        color: #222;
    }

    .info-text {
        margin: 4px 0;
        font-size: 16px;
        color: #555;
    }

    .card-title-fixed {
        width: 100%;
        height: 50px;
        line-height: 50px;
        margin: 0;
        padding-left: 40px;
        font-size: 20px;
        color: #222;
        background-color: #f8fafe;
        border-bottom: 1px solid #e2e8f5;
        box-sizing: border-box;
    }

    .card-medium {
        height: 500px;
        display: flex;
        flex-direction: column;
    }

    .map-space {
        width: 100%;
        height: 450px;
        background-color: #f1f5f9;
        display: flex;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
    }

    .placeholder-text {
        color: #94a3b8;
        font-size: 16px;
    }

    .card-long {
        height: 1000px;
        display: flex;
        flex-direction: column;
    }

    .card-slot-space {
        width: 100%;
        flex: 1;
        background-color: #ffffff;
        box-sizing: border-box;

        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 25px 0;

        overflow-y: auto;
    }

    .card-slot {
        width: 1150px;
        height: auto;
        display: flex;
        flex-direction: column;
        gap: 25px;
        box-sizing: border-box;
    }

    .info-sub-card {
        width: 1150px;
        height: 170px;
        border: 1px solid #D9D9D9;
        border-radius: 8px;
        background-color: #ffffff;
        box-sizing: border-box;

        display: flex;
        align-items: center;
        padding: 0 20px;
    }

    .card-image-place {
        width: 120px;
        height: 160px;
        background-color: #f1f5f9;
        border-radius: 6px;
        flex-shrink: 0;
        box-sizing: border-box;
    }

    .card-image-place img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }

    .thumb-text {
        font-size: 13px;
        color: #94a3b8;
        text-align: center;
        margin: 0;
        line-height: 1.4;
    }

    .card-content {
        flex: 1;
        margin-left: 25px;
        text-align: left;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .card-content h4 {
        margin: 0 0 10px 0;
        font-size: 18px;
        color: #222;
        font-weight: 600;
    }

    .card-desc {
        margin: 0;
        font-size: 15px;
        color: #555;
        line-height: 1.6;
    }

    .no-preference {
        margin: auto;
        text-align: center;
        color: #888;
        font-size: 15px;
        line-height: 2;
    }
</style>

<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>

<main class="detail-container">

    <section class="info-card card-short">
        <h3 class="card-title-auto" th:text="${venue.getName()}">OOO</h3>
        <p class="info-text">주소: <span th:text="${venue.getAddress()}"></span></p>
        <p class="info-text">전화번호: <span th:text="${venue.getTelnum()}"></span></p>
        <p class="info-text">홈페이지 주소: <span th:text="${venue.getRelateurl()}"></span></p>
    </section>

    <section class="info-card card-medium">
        <h3 class="card-title-fixed">시설 위치</h3>
        <div class="map-space"></div>
    </section>

    <section class="info-card card-long">
        <h3 class="card-title-fixed">예매 가능 공연</h3>
        <div class="card-slot-space">
            <div class="card-slot">
                <div class="no-performances">
                    <p>예매 가능한 공연이 없습니다.</p>
                </div>
            </div>
        </div>
    </section>

</main>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>

<script th:inline="javascript" type="text/javascript">

    const lat = /*[[${venue.getLat()}]]*/ 33.450701;
    const lon = /*[[${venue.getLon()}]]*/ 126.570667;
    const position = new kakao.maps.LatLng(lat, lon);

    const container = document.querySelector(".map-space");
    const options = {
        center: position,
        level: 3
    };

    const map = new kakao.maps.Map(container, options);
    const marker = new kakao.maps.Marker({
        position: position
    });

    marker.setMap(map)

    async function getPerformancesData(venueId) {
        try {

            const fetchUrl = "/api/venue/performances?venueId=" + venueId;
            const response = await fetch(fetchUrl, {
                method: 'GET',
                headers: {
                    "Content-Type": "application/json"
                }
            });

            const resultJson = await response.json();
            console.log(resultJson);

            const cardSlot = document.querySelector(".card-slot");

            cardSlot.replaceChildren();

            // ⚠️ 기존에는 위 replaceChildren()이 무조건 실행되어 "예매 가능한 공연이 없습니다"
            // 안내 문구까지 지워버렸고, 공연이 0건이면 forEach도 아무것도 추가하지 않아
            // 결과적으로 안내 문구도 없이 텅 빈 박스만 보였습니다.
            if (!Array.isArray(resultJson) || resultJson.length === 0) {
                const noPerf = document.createElement("div");
                noPerf.classList.add("no-performances");
                noPerf.innerHTML = "<p>예매 가능한 공연이 없습니다.</p>";
                cardSlot.appendChild(noPerf);
                return;
            }

            resultJson.forEach(item => {
                const infoSubCard = document.createElement("a");
                infoSubCard.classList.add("info-sub-card");
                infoSubCard.href = "/venue/" + item.performanceId + "/detail";

                const cardImagePlace = document.createElement("div");
                cardImagePlace.classList.add("card-image-place");

                const img = document.createElement("img");
                img.src = item.posterUrl;
                img.alt = item.title;

                cardImagePlace.appendChild(img);

                const textArea = document.createElement("div");
                textArea.classList.add("card-content");

                const title = document.createElement("h4");
                title.textContent = item.title;

                const desc = document.createElement("p");
                desc.classList.add("card-desc");
                desc.textContent = item.startDate + " ~ " + item.endDate;

                textArea.appendChild(title);
                textArea.appendChild(desc);

                infoSubCard.appendChild(cardImagePlace);
                infoSubCard.appendChild(textArea);

                cardSlot.appendChild(infoSubCard);
            })

        } catch (err) {
            console.log(err);
        }
    }

    const path = window.location.pathname;
    const segments = path.split('/');
    const venueId = segments.at(-1);
    if (venueId) {
        getPerformancesData(venueId);
    }
</script>

</html>
