<!DOCTYPE html>

<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>클리어티켓 - 취소 완료</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>
<main>
    <div class="page-wrap fade-in">
        <div class="mypage-layout">
            <th:block th:replace="~{fragments/mypage-sidebar :: sidebar('reservations')}"></th:block>

            <div class="main-content">
                <!-- 공연 정보 요약 -->
                <div class="card" style="margin-bottom:28px;">
                    <div style="display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;">
                        <div class="img-placeholder" style="width:100px;height:130px;flex-shrink:0;"></div>
                        <div style="flex:1;">
                            <h2 style="font-size:18px;font-weight:700;margin-bottom:16px;">BLUE HOUR : 청춘이 빛나는 우리들의 시간</h2>
                            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px 32px;font-size:14px;">
                                <dl style="display:grid;grid-template-columns:100px 1fr;gap:6px 0;">
                                    <dt style="color:#9999BB;">예매번호</dt><dd>C12345678</dd>
                                    <dt style="color:#9999BB;">예매일시</dt><dd>2026.04.10</dd>
                                    <dt style="color:#9999BB;">관람일시</dt><dd>2026.06.06 (토) 17:00</dd>
                                    <dt style="color:#9999BB;">매수</dt><dd>1매</dd>
                                </dl>
                                <dl style="display:grid;grid-template-columns:100px 1fr;gap:6px 0;">
                                    <dt style="color:#9999BB;">공연장</dt><dd>KSPO DOME</dd>
                                    <dt style="color:#9999BB;">예매자</dt><dd>OOO</dd>
                                    <dt style="color:#9999BB;">취소가능</dt><dd>2026.06.05 (금) 11:59 까지</dd>
                                    <dt style="color:#9999BB;">상태</dt><dd><span class="badge badge-gray">취소완료</span></dd>
                                </dl>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 완료 메시지 -->
                <div style="text-align:center;padding:40px 20px;">
                    <h2 style="font-size:20px;font-weight:800;margin-bottom:12px;">요청하신 예매취소가 완료 되었습니다.</h2>
                    <p style="font-size:14px;color:#9999BB;line-height:1.8;">
                        취소 완료 후 결제 수단에 따라 입금까지 약 1일~2주 소요될 수 있습니다.<br>
                        확인하기 버튼을 클릭하시면 예매내역 확인 페이지로 이동합니다.<br>
                        취소가 정상적으로 이루어졌는지 다시 한번 확인 하시기 바랍니다.
                    </p>
                </div>

                <div style="text-align:center;">
                    <a th:href="@{/mypage/reservations}" class="btn btn-primary" style="min-width:200px;">취소내역보기</a>
                </div>
            </div>
        </div>
    </div>
</main>
<th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>
</html>
