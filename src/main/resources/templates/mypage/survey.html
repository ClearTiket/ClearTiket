<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>클리어티켓 - 취향 설문</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        .survey-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 48px 16px 64px;
            background: var(--bg, #F7F8FD);
            min-height: calc(100vh - 120px);
        }
        .survey-greeting { text-align: center; margin-bottom: 28px; }
        .survey-greeting .name { font-size: 20px; font-weight: 700; color: #1A1A2E; margin-bottom: 6px; }
        .survey-greeting .sub { font-size: 13px; color: #9999BB; }
        .survey-card {
            background: #fff;
            border: 1.5px solid #E2E4F0;
            border-radius: 20px;
            padding: 32px 36px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 4px 24px rgba(75,110,245,.08);
        }
        .q-block { margin-bottom: 28px; }
        .q-block:last-of-type { margin-bottom: 0; }
        .q-title { font-size: 13px; font-weight: 700; color: #1A1A2E; margin-bottom: 14px; line-height: 1.5; }
        .q-title span { font-weight: 400; color: #9999BB; }
        .chip-group { display: flex; flex-wrap: wrap; gap: 10px; }
        .chip {
            padding: 9px 22px; border-radius: 24px;
            border: 1.5px solid #E2E4F0; background: #fff;
            color: #555577; font-size: 13.5px; font-weight: 600;
            font-family: inherit; cursor: pointer; transition: all .18s; user-select: none;
        }
        .chip:hover { border-color: #4B6EF5; color: #4B6EF5; }
        .chip.selected {
            background: #4B6EF5; border-color: #4B6EF5; color: #fff;
            box-shadow: 0 2px 8px rgba(75,110,245,.3);
        }
        .q-divider { height: 1px; background: #E2E4F0; margin: 24px 0; }
        .skip-row { text-align: right; margin-top: 20px; }
        .skip-link {
            font-size: 12px; color: #9999BB; text-decoration: underline;
            cursor: pointer; background: none; border: none;
            font-family: inherit; transition: color .15s;
        }
        .skip-link:hover { color: #4B6EF5; }
        .survey-cta { width: 100%; max-width: 520px; margin-top: 16px; }
        .btn-cta {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            font-size: 15px; font-weight: 700; font-family: inherit;
            cursor: pointer; transition: all .2s;
            background: #C0C8E8; color: #fff; pointer-events: none;
        }
        .btn-cta.ready {
            background: #4B6EF5; pointer-events: auto;
            box-shadow: 0 4px 14px rgba(75,110,245,.35);
        }
        .btn-cta.ready:hover { background: #3558E0; transform: translateY(-1px); }
    </style>
</head>
<body>

<th:block th:replace="~{fragments/header :: header}"></th:block>

<main>
    <div class="survey-wrap">

        <div class="survey-greeting">
            <div class="name">
                <span th:text="${loginUser != null ? loginUser.name : ''}"></span>님 반가워요!
            </div>
            <div class="sub">취향에 맞는 공연을 추천해 드릴게요. 30초만 투자해 주세요 :)</div>
        </div>

        <div class="survey-card">

            <!-- Q1. 장르 (최대 2개) -->
            <div class="q-block">
                <div class="q-title">Q1. 어떤 장르의 공연을 좋아하시나요? <span>(최대 2개)</span></div>
                <div class="chip-group" id="q1-group">
                    <button type="button" class="chip" data-value="콘서트"
                            th:classappend="${savedGenres != null and savedGenres.contains('콘서트')} ? ' selected'"
                            onclick="selectChip(this,'q1',2)">콘서트</button>
                    <button type="button" class="chip" data-value="뮤지컬"
                            th:classappend="${savedGenres != null and savedGenres.contains('뮤지컬')} ? ' selected'"
                            onclick="selectChip(this,'q1',2)">뮤지컬</button>
                    <button type="button" class="chip" data-value="클래식"
                            th:classappend="${savedGenres != null and savedGenres.contains('클래식')} ? ' selected'"
                            onclick="selectChip(this,'q1',2)">클래식</button>
                </div>
            </div>

            <div class="q-divider"></div>

            <!-- Q2. 분위기 (최대 2개) -->
            <div class="q-block">
                <div class="q-title">Q2. 어떤 분위기의 공연을 좋아하시나요? <span>(최대 2개)</span></div>
                <div class="chip-group" id="q2-group">
                    <button type="button" class="chip" data-value="눈물폭발"
                            th:classappend="${savedMoods != null and savedMoods.contains('눈물폭발')} ? ' selected'"
                            onclick="selectChip(this,'q2',2)">눈물폭발</button>
                    <button type="button" class="chip" data-value="귀호강"
                            th:classappend="${savedMoods != null and savedMoods.contains('귀호강')} ? ' selected'"
                            onclick="selectChip(this,'q2',2)">귀호강</button>
                    <button type="button" class="chip" data-value="웅장한"
                            th:classappend="${savedMoods != null and savedMoods.contains('웅장한')} ? ' selected'"
                            onclick="selectChip(this,'q2',2)">웅장한</button>
                    <button type="button" class="chip" data-value="스트레스해소"
                            th:classappend="${savedMoods != null and savedMoods.contains('스트레스해소')} ? ' selected'"
                            onclick="selectChip(this,'q2',2)">스트레스해소</button>
                    <button type="button" class="chip" data-value="심장쫄깃"
                            th:classappend="${savedMoods != null and savedMoods.contains('심장쫄깃')} ? ' selected'"
                            onclick="selectChip(this,'q2',2)">심장쫄깃</button>
                    <button type="button" class="chip" data-value="배꼽빠지는"
                            th:classappend="${savedMoods != null and savedMoods.contains('배꼽빠지는')} ? ' selected'"
                            onclick="selectChip(this,'q2',2)">배꼽빠지는</button>
                    <button type="button" class="chip" data-value="화려한볼거리"
                            th:classappend="${savedMoods != null and savedMoods.contains('화려한볼거리')} ? ' selected'"
                            onclick="selectChip(this,'q2',2)">화려한볼거리</button>
                    <button type="button" class="chip" data-value="잔잔한위로"
                            th:classappend="${savedMoods != null and savedMoods.contains('잔잔한위로')} ? ' selected'"
                            onclick="selectChip(this,'q2',2)">잔잔한위로</button>
                    <button type="button" class="chip" data-value="입문자추천"
                            th:classappend="${savedMoods != null and savedMoods.contains('입문자추천')} ? ' selected'"
                            onclick="selectChip(this,'q2',2)">입문자추천</button>
                </div>
            </div>

            <div class="q-divider"></div>

            <!-- Q3. 동행 (1개) -->
            <div class="q-block">
                <div class="q-title">Q3. 주로 누구와 함께 관람하시나요? <span>(최대 1개)</span></div>
                <div class="chip-group" id="q3-group">
                    <button type="button" class="chip" data-value="혼자서"
                            th:classappend="${savedCompanion == '혼자서'} ? ' selected'"
                            onclick="selectChip(this,'q3',1)">혼자서 혼공!</button>
                    <button type="button" class="chip" data-value="연인과 함께"
                            th:classappend="${savedCompanion == '연인과 함께'} ? ' selected'"
                            onclick="selectChip(this,'q3',1)">연인과 함께</button>
                    <button type="button" class="chip" data-value="친구와 함께"
                            th:classappend="${savedCompanion == '친구와 함께'} ? ' selected'"
                            onclick="selectChip(this,'q3',1)">친구와 함께</button>
                    <button type="button" class="chip" data-value="부모님과 함께"
                            th:classappend="${savedCompanion == '부모님과 함께'} ? ' selected'"
                            onclick="selectChip(this,'q3',1)">부모님과 함께</button>
                    <button type="button" class="chip" data-value="아이와 함께"
                            th:classappend="${savedCompanion == '아이와 함께'} ? ' selected'"
                            onclick="selectChip(this,'q3',1)">아이와 함께</button>
                </div>
            </div>

            <div class="skip-row">
                <button type="button" class="skip-link"
                        th:onclick="|location.href='@{/mypage}'|">다음에 할게요 Skip</button>
            </div>
        </div>

        <div class="survey-cta">
            <button type="button" class="btn-cta" id="cta-btn" onclick="submitSurvey()">
                나에게 맞는 공연 보러 가기
            </button>
        </div>

    </div>
</main>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>

<script th:inline="javascript">
    const state = { q1: [], q2: [], q3: [] };

    // 페이지 로드 시 이미 selected된 chip을 state에 등록
    document.querySelectorAll('#q1-group .chip.selected').forEach(b => state.q1.push(b));
    document.querySelectorAll('#q2-group .chip.selected').forEach(b => state.q2.push(b));
    document.querySelectorAll('#q3-group .chip.selected').forEach(b => state.q3.push(b));
    updateCta();

    function selectChip(btn, group, max) {
        const isSelected = btn.classList.contains('selected');
        if (isSelected) {
            btn.classList.remove('selected');
            state[group] = state[group].filter(b => b !== btn);
        } else {
            if (state[group].length >= max) {
                state[group].shift().classList.remove('selected');
            }
            btn.classList.add('selected');
            state[group].push(btn);
        }
        updateCta();
    }

    function updateCta() {
        const ready = state.q1.length >= 1 && state.q2.length >= 1 && state.q3.length >= 1;
        document.getElementById('cta-btn').classList.toggle('ready', ready);
    }

    async function submitSurvey() {
        if (!document.getElementById('cta-btn').classList.contains('ready')) return;

        const payload = {
            genres:    state.q1.map(b => b.dataset.value),
            moods:     state.q2.map(b => b.dataset.value),
            companion: state.q3.length > 0 ? state.q3[0].dataset.value : ''
        };

        const csrfMeta   = document.querySelector('meta[name="_csrf"]');
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]');
        const headers = { 'Content-Type': 'application/json' };
        if (csrfMeta && csrfHeader) headers[csrfHeader.content] = csrfMeta.content;

        const res = await fetch('/survey', {
            method: 'POST',
            headers: headers,
            body: JSON.stringify(payload)
        });

        const text = await res.text();
        if (text === 'SUCCESS') {
            location.href = '/mypage';
        } else {
            alert('저장에 실패했습니다. 다시 시도해 주세요.');
        }
    }
</script>
</body>
</html>
