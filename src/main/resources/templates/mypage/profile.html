<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>클리어티켓 - 기본정보관리</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        .profile-banner {
            display:flex; align-items:center; gap:28px;
            padding:32px 36px;
            background:linear-gradient(135deg,#4B6EF5 0%,#6B9BF9 100%);
            border-radius:20px; margin-bottom:28px;
            position:relative; overflow:hidden;
        }
        .profile-banner::before {
            content:''; position:absolute; right:-40px; top:-40px;
            width:220px; height:220px; border-radius:50%;
            background:rgba(255,255,255,.08);
        }
        .profile-banner::after {
            content:''; position:absolute; right:60px; bottom:-60px;
            width:160px; height:160px; border-radius:50%;
            background:rgba(255,255,255,.06);
        }
        .avatar-ring {
            width:80px; height:80px; border-radius:50%;
            background:rgba(255,255,255,.2);
            display:flex; align-items:center; justify-content:center;
            flex-shrink:0; position:relative; z-index:1;
            border:3px solid rgba(255,255,255,.5);
        }
        .avatar-ring span { font-size:30px; font-weight:800; color:#fff; }
        .profile-banner-info { position:relative; z-index:1; }
        .profile-banner-info h2 { font-size:20px; font-weight:700; color:#fff; margin-bottom:4px; }
        .profile-banner-info p { font-size:13px; color:rgba(255,255,255,.75); }

        .info-card { background:#fff; border:1.5px solid #E2E4F0; border-radius:20px; overflow:hidden; margin-bottom:20px; }
        .info-card-header {
            display:flex; align-items:center; gap:10px;
            padding:22px 32px; border-bottom:1.5px solid #E2E4F0;
            background:#FAFAFE;
        }
        .info-card-header svg { color:#4B6EF5; }
        .info-card-header h3 { font-size:15px; font-weight:700; }
        .info-card-body { padding:8px 32px 24px; }

        .field-row {
            display:grid; grid-template-columns:160px 1fr auto;
            gap:0 20px; align-items:center;
            padding:18px 0; border-bottom:1px solid #E2E4F0;
        }
        .field-row:last-child { border-bottom:none; }
        .field-label { font-size:13px; color:#9999BB; font-weight:600; }
        .field-value { font-size:14px; font-weight:500; color:#1A1A2E; }
        .field-readonly { font-size:14px; font-weight:500; color:#9999BB; }

        .field-input-wrap { display:flex; gap:8px; align-items:center; }
        .field-input {
            flex:1; padding:9px 14px;
            border:1.5px solid #E2E4F0; border-radius:10px;
            font-size:14px; font-family:inherit; outline:none;
            transition:border-color .2s,box-shadow .2s; background:#FAFAFE;
        }
        .field-input:focus { border-color:#4B6EF5; box-shadow:0 0 0 3px rgba(75,110,245,.1); background:#fff; }

        .email-edit-wrap { display:flex; flex-direction:column; gap:8px; }
        .email-edit-row { display:flex; gap:8px; align-items:center; }
        .email-edit-row .field-input { max-width:280px; }

        .pw-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px 28px; padding:4px 0; }
        @media(max-width:720px){ .pw-grid { grid-template-columns:1fr; } }
        .pw-group { display:flex; flex-direction:column; gap:6px; }
        .pw-label { font-size:12px; font-weight:600; color:#555577; }
        .pw-input-wrap { position:relative; }
        .pw-input {
            width:100%; padding:10px 42px 10px 14px;
            border:1.5px solid #E2E4F0; border-radius:10px;
            font-size:14px; font-family:inherit; outline:none;
            transition:border-color .2s,box-shadow .2s; background:#FAFAFE;
        }
        .pw-input:focus { border-color:#4B6EF5; box-shadow:0 0 0 3px rgba(75,110,245,.1); background:#fff; }
        .pw-eye {
            position:absolute; right:12px; top:50%; transform:translateY(-50%);
            background:none; border:none; cursor:pointer; color:#9999BB;
            display:flex; padding:0; transition:color .15s;
        }
        .pw-eye:hover { color:#4B6EF5; }
        .pw-hint { font-size:11px; color:#9999BB; margin-top:2px; }
        .pw-submit-row { padding:20px 32px 28px; border-top:1px solid #E2E4F0; display:flex; justify-content:flex-end; }

        .save-bar {
            display:flex; gap:12px; justify-content:flex-end; align-items:center;
            padding:24px 32px; background:#FAFAFE;
            border:1.5px solid #E2E4F0; border-radius:20px;
        }
        .withdraw-link {
            font-size:12px; color:#9999BB; text-decoration:underline; cursor:pointer;
            background:none; border:none; font-family:inherit; margin-right:auto;
        }
        .withdraw-link:hover { color:#E53E3E; }
        .error-msg { font-size:12px; color:#E53E3E; margin-top:4px; }

        /* ── 취향 설정 칩 ── */
        .survey-chip-group { display:flex; flex-wrap:wrap; gap:8px; }
        .s-chip {
            padding:8px 18px; border-radius:24px; border:1.5px solid #E2E4F0;
            background:#fff; color:#555577; font-size:13px; font-weight:600;
            font-family:inherit; cursor:pointer; transition:all .18s; user-select:none;
        }
        .s-chip:hover { border-color:#4B6EF5; color:#4B6EF5; }
        .s-chip.selected { background:#4B6EF5; border-color:#4B6EF5; color:#fff; box-shadow:0 2px 6px rgba(75,110,245,.28); }

        /* 저장 피드백 토스트 */
        .toast {
            position:fixed; bottom:32px; left:50%; transform:translateX(-50%) translateY(20px);
            background:#1A1A2E; color:#fff; padding:12px 24px; border-radius:10px;
            font-size:14px; font-weight:600; opacity:0;
            transition:opacity .3s, transform .3s; pointer-events:none; z-index:9999;
        }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    </style>
</head>
<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>
<main>
    <div class="page-wrap fade-in">
        <h1 class="section-title">기본정보관리</h1>
        <div class="mypage-layout">
            <th:block th:replace="~{fragments/mypage-sidebar :: sidebar('profile')}"></th:block>

            <div class="main-content">

                <!-- 프로필 배너 -->
                <div class="profile-banner">
                    <div class="avatar-ring">
                        <span th:text="${loginUser.name.substring(0,1)}"></span>
                    </div>
                    <div class="profile-banner-info">
                        <h2><span th:text="${loginUser.name}"></span> 님, 안녕하세요.</h2>
                        <p th:text="${loginUser.email}"></p>
                    </div>
                </div>

                <!-- ── 기본 정보 카드 ── -->
                <div class="info-card">
                    <div class="info-card-header">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        <h3>기본 정보</h3>
                    </div>
                    <div class="info-card-body">

                        <div class="field-row">
                            <span class="field-label">이메일 (아이디)</span>
                            <span class="field-readonly" th:text="${loginUser.email}"></span>
                            <div></div>
                        </div>

                        <div class="field-row">
                            <span class="field-label">이름</span>
                            <span class="field-readonly" th:text="${loginUser.name}"></span>
                            <div></div>
                        </div>

                        <div class="field-row">
                            <span class="field-label">전화번호</span>
                            <div id="phone-view" class="field-value"
                                 th:text="${loginUser.phone != null and !#strings.isEmpty(loginUser.phone)} ? ${loginUser.phone} : '등록된 번호가 없습니다.'"></div>
                            <div id="phone-input" class="field-input-wrap" style="display:none;">
                                <input type="tel" class="field-input" id="phone-field" th:value="${loginUser.phone}"
                                       placeholder="010-0000-0000" maxlength="13" oninput="formatPhone(this); validatePhone();">
                            </div>
                            <button class="btn btn-outline-gray btn-sm" id="phone-btn" onclick="handlePhoneButtonClick()">수정</button>
                        </div>
                        <p id="phone-error" class="error-msg" style="display:none;">올바른 전화번호 형식이 아닙니다. (예: 010-1234-5678)</p>

                        <p class="field-readonly" style="font-size:12px; padding:6px 0 0;">
                            이메일(아이디)과 이름은 변경할 수 없습니다.
                        </p>

                    </div>
                </div>

                <!-- ── 비밀번호 변경 카드 ── -->
                <div class="info-card">
                    <div class="info-card-header">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        <h3>비밀번호 변경</h3>
                    </div>
                    <div class="info-card-body" style="padding-bottom:0;">
                        <div class="pw-grid">
                            <div class="pw-group" style="grid-column:1/-1;">
                                <label class="pw-label">현재 비밀번호</label>
                                <div class="pw-input-wrap" style="max-width:360px;">
                                    <input type="password" class="pw-input" id="cur-pw" placeholder="현재 비밀번호 입력">
                                    <button type="button" class="pw-eye" onclick="togglePw('cur-pw')">
                                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                    </button>
                                </div>
                            </div>
                            <div class="pw-group">
                                <label class="pw-label">새 비밀번호</label>
                                <div class="pw-input-wrap">
                                    <input type="password" class="pw-input" id="new-pw" placeholder="새 비밀번호" oninput="validateNewPw()">
                                    <button type="button" class="pw-eye" onclick="togglePw('new-pw')">
                                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                    </button>
                                </div>
                                <p class="pw-hint">8~20자, 대/소문자·숫자·특수문자 조합</p>
                                <p id="new-pw-error" class="error-msg" style="display:none;">8~20자의 영문 대/소문자, 숫자, 특수문자를 조합해야 합니다.</p>
                            </div>
                            <div class="pw-group">
                                <label class="pw-label">새 비밀번호 확인</label>
                                <div class="pw-input-wrap">
                                    <input type="password" class="pw-input" id="new-pw2" placeholder="새 비밀번호 재입력" oninput="validateNewPw()">
                                    <button type="button" class="pw-eye" onclick="togglePw('new-pw2')">
                                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                    </button>
                                </div>
                                <p id="new-pw2-error" class="error-msg" style="display:none;">비밀번호가 일치하지 않습니다.</p>
                            </div>
                        </div>
                    </div>
                    <div class="pw-submit-row">
                        <button type="button" class="btn btn-primary btn-sm" onclick="alert('비밀번호 변경 완료 (데모)')">비밀번호 변경</button>
                    </div>
                </div>

                <!-- ══════════════════════════════════════
                     공연 취향 설정 카드 (DB 연동)
                     컨트롤러에서 survey(SurveyRequestDto) 모델에 담아 전달
                     ══════════════════════════════════════ -->
                <div class="info-card">
                    <div class="info-card-header">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                        <h3>공연 취향 설정</h3>
                    </div>
                    <div class="info-card-body">

                        <!-- Q1. 선호 장르 (최대 2개) -->
                        <div class="field-row" style="grid-template-columns:160px 1fr; align-items:flex-start; padding:20px 0;">
                            <span class="field-label" style="padding-top:6px;">
                                선호 장르
                                <span style="font-weight:400; font-size:11px; color:#9999BB;">최대 2개</span>
                            </span>
                            <div class="survey-chip-group" id="pref-q1">
                                <button type="button" class="s-chip"
                                        th:classappend="${survey != null and survey.genres != null and survey.genres.contains('콘서트')} ? ' selected' : ''"
                                        data-value="콘서트" onclick="toggleSurvey(this,'pref-q1',2)">콘서트</button>
                                <button type="button" class="s-chip"
                                        th:classappend="${survey != null and survey.genres != null and survey.genres.contains('뮤지컬')} ? ' selected' : ''"
                                        data-value="뮤지컬" onclick="toggleSurvey(this,'pref-q1',2)">뮤지컬</button>
                                <button type="button" class="s-chip"
                                        th:classappend="${survey != null and survey.genres != null and survey.genres.contains('연극')} ? ' selected' : ''"
                                        data-value="연극" onclick="toggleSurvey(this,'pref-q1',2)">연극</button>
                                <button type="button" class="s-chip"
                                        th:classappend="${survey != null and survey.genres != null and survey.genres.contains('클래식')} ? ' selected' : ''"
                                        data-value="클래식" onclick="toggleSurvey(this,'pref-q1',2)">클래식</button>
                                <button type="button" class="s-chip"
                                        th:classappend="${survey != null and survey.genres != null and survey.genres.contains('무용/전통')} ? ' selected' : ''"
                                        data-value="무용/전통" onclick="toggleSurvey(this,'pref-q1',2)">무용/전통</button>
                            </div>
                        </div>

                        <!-- Q2. 중요 요소 (1개) -->
                        <div class="field-row" style="grid-template-columns:160px 1fr; align-items:flex-start; padding:20px 0;">
                            <span class="field-label" style="padding-top:6px;">
                                중요 요소
                                <span style="font-weight:400; font-size:11px; color:#9999BB;">1개</span>
                            </span>
                            <div class="survey-chip-group" id="pref-q2">
                                <button type="button" class="s-chip"
                                        th:classappend="${survey != null and survey.moods != null and survey.moods.contains('라인업/배우')} ? ' selected' : ''"
                                        data-value="라인업/배우" onclick="toggleSurvey(this,'pref-q2',1)">라인업/배우</button>
                                <button type="button" class="s-chip"
                                        th:classappend="${survey != null and survey.moods != null and survey.moods.contains('스토리/작품성')} ? ' selected' : ''"
                                        data-value="스토리/작품성" onclick="toggleSurvey(this,'pref-q2',1)">스토리/작품성</button>
                                <button type="button" class="s-chip"
                                        th:classappend="${survey != null and survey.moods != null and survey.moods.contains('티켓 가격')} ? ' selected' : ''"
                                        data-value="티켓 가격" onclick="toggleSurvey(this,'pref-q2',1)">티켓 가격</button>
                                <button type="button" class="s-chip"
                                        th:classappend="${survey != null and survey.moods != null and survey.moods.contains('무대 연출/음악')} ? ' selected' : ''"
                                        data-value="무대 연출/음악" onclick="toggleSurvey(this,'pref-q2',1)">무대 연출/음악</button>
                                <button type="button" class="s-chip"
                                        th:classappend="${survey != null and survey.moods != null and survey.moods.contains('관람 후기')} ? ' selected' : ''"
                                        data-value="관람 후기" onclick="toggleSurvey(this,'pref-q2',1)">관람 후기</button>
                            </div>
                        </div>

                        <!-- Q3. 주 동행 (1개) -->
                        <div class="field-row" style="grid-template-columns:160px 1fr; align-items:flex-start; padding:20px 0; border-bottom:none;">
                            <span class="field-label" style="padding-top:6px;">
                                주 관람 동행
                                <span style="font-weight:400; font-size:11px; color:#9999BB;">1개</span>
                            </span>
                            <div class="survey-chip-group" id="pref-q3">
                                <button type="button" class="s-chip"
                                        th:classappend="${survey != null and survey.companion == '혼자서'} ? ' selected' : ''"
                                        data-value="혼자서" onclick="toggleSurvey(this,'pref-q3',1)">혼자서 혼공!</button>
                                <button type="button" class="s-chip"
                                        th:classappend="${survey != null and survey.companion == '연인과 함께'} ? ' selected' : ''"
                                        data-value="연인과 함께" onclick="toggleSurvey(this,'pref-q3',1)">연인과 함께</button>
                                <button type="button" class="s-chip"
                                        th:classappend="${survey != null and survey.companion == '친구와 함께'} ? ' selected' : ''"
                                        data-value="친구와 함께" onclick="toggleSurvey(this,'pref-q3',1)">친구와 함께</button>
                                <button type="button" class="s-chip"
                                        th:classappend="${survey != null and survey.companion == '가족과 함께'} ? ' selected' : ''"
                                        data-value="가족과 함께" onclick="toggleSurvey(this,'pref-q3',1)">가족과 함께</button>
                            </div>
                        </div>

                    </div>

                    <!-- 취향 저장 버튼 (카드 하단) -->
                    <div class="pw-submit-row">
                        <button type="button" class="btn btn-primary btn-sm" onclick="saveSurvey()">취향 저장</button>
                    </div>
                </div>

                <!-- ── 저장 바 (기본 정보 전체 저장) ── -->
                <div class="save-bar">
                    <button type="button" class="withdraw-link"
                            onclick="if(confirm('정말 탈퇴하시겠습니까?')) alert('탈퇴 처리 (데모)')">회원탈퇴</button>
                    <button type="button" class="btn btn-outline-gray" onclick="history.back()">취소</button>
                    <button type="button" class="btn btn-primary" onclick="saveProfile()">저장하기</button>
                </div>

            </div>
        </div>
    </div>
</main>
<th:block th:replace="~{fragments/footer :: footer}"></th:block>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script th:inline="javascript">
    /* ── 기본 정보 편집 ──────────────────────────────── */
    function toggleEdit(field) {
        const view  = document.getElementById(field + '-view');
        const input = document.getElementById(field + '-input');
        const btn   = document.getElementById(field + '-btn');
        const isEditing = input.style.display !== 'none';

        view.style.display  = isEditing ? '' : 'none';
        input.style.display = isEditing ? 'none' : '';
        if (isEditing) {
            const f = document.getElementById(field + '-field');
            if (f) view.textContent = f.value || '등록된 번호가 없습니다.';
            btn.textContent = '수정';
            btn.classList.replace('btn-primary','btn-outline-gray');
        } else {
            btn.textContent = '완료';
            btn.classList.replace('btn-outline-gray','btn-primary');
        }
    }

    /*
     * 전화번호 행의 '수정/완료' 버튼 전용 핸들러.
     * 기존에는 '완료'를 눌러도 toggleEdit()만 호출되어 화면 텍스트만 바뀌고
     * 실제 저장 API(PUT /api/users/me/profile)는 호출되지 않아, 페이지 맨 아래의
     * 별도 '저장하기' 버튼을 또 눌러야만 DB에 반영되는 문제가 있었다.
     * 이제는 '완료'를 누르는 즉시 저장까지 한 번에 처리한다.
     */
    function handlePhoneButtonClick() {
        const input = document.getElementById('phone-input');
        const isEditing = input.style.display !== 'none';

        if (!isEditing) {
            toggleEdit('phone');
            document.getElementById('phone-field').focus();
            return;
        }

        const f = document.getElementById('phone-field');
        if (f.value && !validatePhone()) {
            showToast('전화번호 형식을 확인해 주세요. (예: 010-1234-5678)', true);
            return;
        }

        saveProfile();
    }

    function togglePw(id) {
        const el = document.getElementById(id);
        el.type = el.type === 'password' ? 'text' : 'password';
    }

    function validateNewPw() {
        const pw  = document.getElementById('new-pw').value;
        const pw2 = document.getElementById('new-pw2').value;
        const ok  = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,20}$/.test(pw);
        document.getElementById('new-pw-error').style.display  = (!ok && pw)  ? 'block' : 'none';
        if (pw2) document.getElementById('new-pw2-error').style.display = (pw !== pw2) ? 'block' : 'none';
    }

    function formatPhone(el) {
        let v = el.value.replace(/\D/g,'');
        if (v.length <= 3)      el.value = v;
        else if (v.length <= 7) el.value = v.slice(0,3) + '-' + v.slice(3);
        else                    el.value = v.slice(0,3) + '-' + v.slice(3,7) + '-' + v.slice(7,11);
    }

    /* 백엔드 UserService의 PHONE_REGEX(^01[0-9]-\d{3,4}-\d{4}$)와 동일하게 맞춤 */
    const PHONE_REGEX = /^01[0-9]-\d{3,4}-\d{4}$/;

    function validatePhone() {
        const v = document.getElementById('phone-field').value;
        const ok = PHONE_REGEX.test(v);
        document.getElementById('phone-error').style.display = (!ok && v) ? 'block' : 'none';
        return ok;
    }

    /* ── 기본 정보 저장 (전화번호만 실제로 변경 가능) ─── */
    const currentName  = /*[[${loginUser.name}]]*/ '';
    const currentEmail = /*[[${loginUser.email}]]*/ '';

    function saveProfile() {
        const phoneInputVisible = document.getElementById('phone-input').style.display !== 'none';
        const phoneValue = phoneInputVisible
            ? document.getElementById('phone-field').value
            : document.getElementById('phone-view').textContent.trim();
        const phone = (phoneValue === '등록된 번호가 없습니다.') ? '' : phoneValue;

        if (phone && !PHONE_REGEX.test(phone)) {
            showToast('전화번호 형식이 올바르지 않습니다. (예: 010-1234-5678)', true);
            return;
        }

        const csrfToken  = document.querySelector('meta[name="_csrf"]')?.content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;
        const headers = { 'Content-Type': 'application/json' };
        if (csrfToken && csrfHeader) headers[csrfHeader] = csrfToken;

        fetch('/api/users/me/profile', {
            method: 'PUT',
            headers,
            body: JSON.stringify({ name: currentName, email: currentEmail, phone })
        })
            .then(res => {
                if (!res.ok) throw new Error('저장 실패');
                return res.text();
            })
            .then(() => {
                showToast('기본정보가 저장되었습니다.');
                document.getElementById('phone-view').textContent = phone || '등록된 번호가 없습니다.';
                if (phoneInputVisible) toggleEdit('phone');
            })
            .catch(() => showToast('저장에 실패했습니다. 다시 시도해 주세요.', true));
    }

    /* ── 취향 칩 선택 ───────────────────────────────── */
    const surveyState = {};

    function initSurveyState() {
        ['pref-q1', 'pref-q2', 'pref-q3'].forEach(groupId => {
            surveyState[groupId] = [];
            document.querySelectorAll('#' + groupId + ' .s-chip.selected').forEach(btn => {
                surveyState[groupId].push(btn);
            });
        });
    }

    function toggleSurvey(btn, group, max) {
        if (!surveyState[group]) surveyState[group] = [];
        const isSelected = btn.classList.contains('selected');
        if (isSelected) {
            btn.classList.remove('selected');
            surveyState[group] = surveyState[group].filter(b => b !== btn);
        } else {
            if (surveyState[group].length >= max) {
                surveyState[group].shift().classList.remove('selected');
            }
            btn.classList.add('selected');
            surveyState[group].push(btn);
        }
    }

    /* ── 취향 저장 (AJAX POST → /survey) ─────── */
    function saveSurvey() {
        const genres    = surveyState['pref-q1']?.map(b => b.dataset.value) ?? [];
        const moods     = surveyState['pref-q2']?.map(b => b.dataset.value) ?? [];
        const companion = surveyState['pref-q3']?.[0]?.dataset.value ?? null;

        if (genres.length === 0 && moods.length === 0 && !companion) {
            showToast('최소 하나의 항목을 선택해 주세요.', true);
            return;
        }

        const payload = { genres, moods, companion };

        const csrfToken  = document.querySelector('meta[name="_csrf"]')?.content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;

        const headers = { 'Content-Type': 'application/json' };
        if (csrfToken && csrfHeader) headers[csrfHeader] = csrfToken;

        fetch(/*[[@{/survey}]]*/ '/survey', {
            method: 'POST',
            headers,
            body: JSON.stringify(payload)
        })
            .then(res => {
                if (!res.ok) throw new Error('서버 오류');
                return res.text();
            })
            .then(text => {
                if (text === 'SUCCESS') showToast('취향 설정이 저장되었습니다.');
                else showToast('저장에 실패했습니다. 다시 시도해 주세요.', true);
            })
            .catch(() => showToast('저장에 실패했습니다. 다시 시도해 주세요.', true));
    }

    /* ── 토스트 ──────────────────────────────────────── */
    function showToast(msg, isError = false) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.background = isError ? '#E53E3E' : '#1A1A2E';
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2800);
    }

    /* 초기화 */
    document.addEventListener('DOMContentLoaded', initSurveyState);
</script>
</body>
