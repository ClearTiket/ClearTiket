<!DOCTYPE html>

<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>클리어티켓 - 예매상세정보</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body th:attr="data-reservation-id=${reservationId}">
<th:block th:replace="~{fragments/header :: header}"></th:block>
<main>
    <div class="page-wrap fade-in">
        <h1 class="section-title">예매상세정보</h1>
        <div class="mypage-layout">
            <th:block th:replace="~{fragments/mypage-sidebar :: sidebar('reservations')}"></th:block>

            <div class="main-content" id="detail-root">
                <div class="card" style="text-align:center;color:#9999BB;padding:60px 0;">불러오는 중...</div>
            </div>
        </div>
    </div>
</main>
<th:block th:replace="~{fragments/footer :: footer}"></th:block>

<script>
    const STATUS_LABEL = { WAITING: "결제대기", CONFIRMED: "예매완료", CANCELED: "예매취소" };
    const reservationId = document.body.dataset.reservationId;

    function formatDate(dateStr) {
        if (!dateStr) return "-";
        return dateStr.substring(0, 10).replace(/-/g, ".");
    }

    function formatDateWithDay(dateStr) {
        if (!dateStr) return "정보 없음";
        const d = new Date(dateStr);
        const days = ["일", "월", "화", "수", "목", "금", "토"];
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        return `${y}.${m}.${day} (${days[d.getDay()]})`;
    }

    function renderError(message) {
        document.getElementById("detail-root").innerHTML = `
            <div class="card" style="text-align:center;color:#e05252;padding:60px 20px;">
                ${message}<br><br>
                <a href="/mypage/reservations" class="btn btn-outline-gray btn-sm">예매 내역으로 돌아가기</a>
            </div>`;
    }

    function renderDetail(d) {
        const statusLabel = STATUS_LABEL[d.status] || d.status || "-";
        const seatRows = (d.seats || []).map(s => `
            <tr>
                <td>${d.reservationNumber || "-"}</td>
                <td>${s.seatGrade || "-"}</td>
                <td>${s.sectionName || ""}구역 ${s.rowNum || ""}열 ${s.seatNum != null ? s.seatNum : ""}번</td>
                <td>${(s.price || 0).toLocaleString()}</td>
            </tr>
        `).join("") || `<tr><td colspan="4" style="text-align:center;color:#9999BB;">좌석 정보가 없습니다.</td></tr>`;

        const cancelSection = d.canCancel ? `
            <div style="text-align:center;margin-top:16px;padding:14px;background:#EEF1FF;border-radius:10px;">
                <p style="font-weight:700;font-size:15px;">
                    총 결제금액 ${d.totalPrice.toLocaleString()} - 취소 수수료 ${d.cancelFeeAmount.toLocaleString()} =
                    <span style="color:#4B6EF5;font-size:17px;">${d.refundAmount.toLocaleString()}</span>
                </p>
                <p style="font-size:13px;color:#6b7280;margin-top:6px;">${d.cancelDeadlineText || ""}</p>
            </div>
        ` : `
            <div style="text-align:center;margin-top:16px;padding:14px;background:#F3F4F6;border-radius:10px;color:#9999BB;font-size:14px;">
                ${d.status === "CANCELED" ? "이미 취소된 예매입니다." : (d.cancelDeadlineText || "현재는 취소가 불가능한 예매입니다.")}
            </div>
        `;

        const shippingBlock = (d.ticketType === "배송" || d.recipientName) ? `
            <div class="card" style="margin-bottom:24px;">
                <h3 style="font-size:16px;font-weight:700;margin-bottom:16px;">티켓수령방법</h3>
                <dl class="info-grid" style="gap:10px 0;">
                    <dt>수령방법</dt><dd>${d.ticketType || "-"}</dd>
                    <dt>받으시는분</dt><dd>${d.recipientName || "-"}</dd>
                    <dt>휴대폰번호</dt><dd>${d.recipientPhone || "-"}</dd>
                    <dt>주소</dt><dd>${d.shippingAddress || "-"}</dd>
                </dl>
            </div>
        ` : "";

        document.getElementById("detail-root").innerHTML = `
            <div class="card" style="margin-bottom:24px;">
                <div style="display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;">
                    ${d.posterImageUrl
                ? `<img src="${d.posterImageUrl}" style="width:100px;height:130px;object-fit:cover;border-radius:8px;flex-shrink:0;">`
                : `<div class="img-placeholder" style="width:100px;height:130px;flex-shrink:0;"></div>`}
                    <div style="flex:1;">
                        <h2 style="font-size:18px;font-weight:700;margin-bottom:16px;">${d.performanceTitle || "공연 정보 없음"}</h2>
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px 32px;">
                            <dl class="info-grid">
                                <dt>예약번호</dt><dd>${d.reservationNumber || "-"}</dd>
                                <dt>예매일시</dt><dd>${formatDate(d.reservationDate)}</dd>
                                <dt>관람일시</dt><dd>${formatDateWithDay(d.showDateTime)}</dd>
                                <dt>매수</dt><dd>${(d.seats || []).length}매</dd>
                            </dl>
                            <dl class="info-grid">
                                <dt>공연장</dt><dd>${d.venueName || "-"}</dd>
                                <dt>상태</dt><dd><span class="badge badge-blue">${statusLabel}</span></dd>
                                <dt>취소안내</dt><dd style="font-size:13px;">${d.cancelDeadlineText || "-"}</dd>
                            </dl>
                        </div>
                    </div>
                </div>
            </div>

            ${shippingBlock}

            <div class="card" style="margin-bottom:24px;">
                <h3 style="font-size:16px;font-weight:700;margin-bottom:16px;">결제내역</h3>
                <table class="fee-table">
                    <tr><td>티켓금액</td><td>${d.ticketPriceSum.toLocaleString()}</td></tr>
                    <tr><td>결제수수료</td><td>${d.shippingFee.toLocaleString()}</td></tr>
                    <tr><td>쿠폰할인</td><td>${d.discountAmount.toLocaleString()}</td></tr>
                    <tr><td style="color:#4B6EF5;font-weight:700;">총금액</td><td style="color:#4B6EF5;font-size:16px;">${d.totalPrice.toLocaleString()}</td></tr>
                </table>
            </div>

            <div class="card" style="margin-bottom:24px;">
                <h3 style="font-size:16px;font-weight:700;margin-bottom:16px;">좌석정보</h3>
                <div style="overflow-x:auto;">
                    <table class="data-table" style="min-width:600px;">
                        <thead>
                        <tr><th>예매번호</th><th>좌석등급</th><th>좌석번호</th><th>가격</th></tr>
                        </thead>
                        <tbody>${seatRows}</tbody>
                    </table>
                </div>
                ${cancelSection}
            </div>

            <div style="display:flex;gap:12px;justify-content:center;">
                <a href="/mypage/reservations" class="btn btn-outline-gray" style="min-width:140px;">이전화면</a>
                <button id="cancel_btn" class="btn btn-primary" style="min-width:140px;" ${d.canCancel ? "" : "disabled"}>취소하기</button>
            </div>
        `;

        const cancelBtn = document.getElementById("cancel_btn");
        if (!d.canCancel && cancelBtn) {
            cancelBtn.style.opacity = "0.5";
            cancelBtn.style.cursor = "not-allowed";
        }
        if (cancelBtn && d.canCancel) {
            cancelBtn.addEventListener("click", doCancel);
        }
    }

    async function doCancel() {
        if (!confirm("정말 취소하시겠습니까? 취소 수수료가 발생할 수 있습니다.")) return;

        try {
            const res = await fetch(`/api/users/me/reservations/${reservationId}/cancel`, { method: "POST" });
            if (res.status === 401) {
                window.location.href = "/login";
                return;
            }
            if (!res.ok) {
                const msg = await res.text();
                alert(msg || "취소 처리에 실패했습니다.");
                return;
            }
            window.location.href = "/mypage/cancel-complete";
        } catch (err) {
            console.error("예매 취소 에러:", err);
            alert("취소 처리 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.");
        }
    }

    async function loadDetail() {
        if (!reservationId || reservationId === "null" || reservationId === "undefined") {
            renderError("잘못된 접근입니다. 예매 내역에서 다시 시도해 주세요.");
            return;
        }
        try {
            const res = await fetch(`/api/users/me/reservations/${reservationId}`);
            if (res.status === 401) {
                window.location.href = "/login";
                return;
            }
            if (!res.ok) {
                const msg = await res.text();
                renderError(msg || "예매 상세 정보를 불러오지 못했습니다.");
                return;
            }
            const detail = await res.json();
            renderDetail(detail);
        } catch (err) {
            console.error("예매 상세 로드 에러:", err);
            renderError("예매 상세 정보를 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.");
        }
    }

    document.addEventListener("DOMContentLoaded", loadDetail);
</script>
</body>
</html>
