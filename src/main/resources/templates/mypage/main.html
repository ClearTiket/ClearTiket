<!DOCTYPE html>

<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>클리어티켓 - 마이페이지</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>
<main>
    <div class="page-wrap fade-in">
        <h1 class="section-title">마이페이지</h1>

        <div class="mypage-layout">
            <th:block th:replace="~{fragments/mypage-sidebar :: sidebar('mypage')}"></th:block>

            <div class="main-content">
                <!-- 프로필 카드 -->
                <div style="display:flex;gap:20px;margin-bottom:32px;flex-wrap:wrap;">
                    <div class="card" style="flex:1;min-width:280px;display:flex;align-items:center;gap:20px;">
                        <div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#6B9BF9,#4B6EF5);display:flex;align-items:center;justify-content:center;color:#fff;font-size:26px;flex-shrink:0;">
                            <span th:text="${session.loginUser?.name?.substring(0,1)} ?: 'P'">P</span>
                        </div>
                        <div>
                            <p style="font-size:18px;font-weight:700;margin-bottom:4px;">
                                Welcome, <span th:text="${session.loginUser?.name} ?: 'OOO'">OOO</span>님
                            </p>
                            <p style="font-size:13px;color:#9999BB;margin-bottom:10px;"
                               th:text="${session.loginUser?.email} ?: 'gildong@gmail.com'">gildong@gmail.com</p>
                            <div style="display:flex;gap:8px;">
                                <button class="btn btn-secondary btn-sm" onclick="location.href='/mypage/profile'">기본정보관리</button>
                                <button class="btn btn-outline-gray btn-sm" onclick="location.href='/mypage/address'">배송지관리</button>
                            </div>
                        </div>
                    </div>

                    <div class="card" style="flex:1;min-width:280px;display:grid;grid-template-columns:1fr 1fr;gap:0;">
                        <div style="text-align:center;padding:20px;border-right:1px solid #E2E4F0;">
                            <p style="font-size:28px;font-weight:800;color:#4B6EF5;">0분</p>
                            <p style="font-size:13px;color:#9999BB;margin-top:4px;">무대 앞에서 심장 뛴 시간</p>
                        </div>
                        <div style="text-align:center;padding:20px;">
                            <p style="font-size:28px;font-weight:800;color:#4B6EF5;">0편</p>
                            <p style="font-size:13px;color:#9999BB;margin-top:4px;">완벽하게 클리어한 무대</p>
                        </div>
                    </div>
                </div>

                <!-- 빈 상태 -->
                <div class="card" style="padding:60px 40px;text-align:center;background:#FAFAFE;">
                    <div style="display:flex;justify-content:center;margin-bottom:24px;">
                        <svg width="110" height="100" viewBox="0 0 110 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="18" y="42" width="74" height="52" rx="4" fill="#E8EAF0"/>
                            <path d="M18 42 L55 32 L55 50 L18 58 Z" fill="#D0D4E4"/>
                            <path d="M92 42 L55 32 L55 50 L92 58 Z" fill="#C4C8DC"/>
                            <rect x="18" y="58" width="74" height="36" rx="2" fill="#D8DBE8"/>
                            <rect x="38" y="34" width="34" height="18" rx="3" fill="#4B6EF5" opacity="0.85"/>
                            <circle cx="10" cy="30" r="3" fill="#4B6EF5" opacity="0.6"/>
                            <circle cx="100" cy="28" r="2.5" fill="#4B6EF5" opacity="0.5"/>
                            <circle cx="6" cy="50" r="2" fill="#86A4F7" opacity="0.5"/>
                            <circle cx="104" cy="48" r="2" fill="#86A4F7" opacity="0.4"/>
                            <circle cx="40" cy="14" r="2" fill="#4B6EF5" opacity="0.4"/>
                            <circle cx="55" cy="8" r="2.5" fill="#4B6EF5" opacity="0.5"/>
                            <circle cx="70" cy="12" r="2" fill="#86A4F7" opacity="0.4"/>
                            <line x1="22" y1="20" x2="28" y2="28" stroke="#4B6EF5" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
                            <line x1="88" y1="20" x2="82" y2="28" stroke="#4B6EF5" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
                        </svg>
                    </div>
                    <p style="font-size:17px;font-weight:700;color:#1A1A2E;margin-bottom:8px;">아직 관람한 공연이 없어요</p>
                    <p style="font-size:13px;color:#9999BB;margin-bottom:28px;">티켓 예매하고 특별한 경험을 시작해보세요!</p>
                    <a href="#" class="btn btn-primary" style="min-width:160px;">공연 둘러보기</a>
                </div>
            </div>
        </div>
    </div>
</main>
<th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>
</html>
