<!DOCTYPE html>

<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>클리어티켓 - 예매/취소 내역</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>
<main>
    <div class="page-wrap fade-in">
        <h1 class="section-title">예매/취소 내역</h1>
        <div class="mypage-layout">
            <th:block th:replace="~{fragments/mypage-sidebar :: sidebar('reservations')}"></th:block>

            <div class="main-content">
                <div class="card" style="padding:0;overflow:hidden;">
                    <table class="data-table">
                        <thead>
                        <tr>
                            <th>예매일</th>
                            <th>공연정보</th>
                            <th>예매일정보</th>
                            <th>상태</th>
                        </tr>
                        </thead>
                        <tbody>
                        <!-- 더미 데이터 3건 반복 -->
                        <tr th:each="i : ${#numbers.sequence(1,3)}">
                            <td style="color:#555577;font-size:13px;white-space:nowrap;">2026.04.10</td>
                            <td>
                                <div style="display:flex;gap:14px;align-items:flex-start;">
                                    <div class="img-placeholder" style="width:68px;height:90px;flex-shrink:0;"></div>
                                    <div>
                                        <p style="font-weight:600;font-size:14px;margin-bottom:6px;">BLUE HOUR : 청춘이 빛나는 우리들의 시간</p>
                                        <p style="font-size:13px;color:#9999BB;">2026.06.06 ~ 2026.06.06</p>
                                        <p style="font-size:13px;color:#9999BB;">KSPO DOME</p>
                                    </div>
                                </div>
                            </td>
                            <td style="font-size:13px;color:#555577;">
                                <p>예약번호 : C781234897</p>
                                <p>관람일 : 2026.06.06 (토)</p>
                            </td>
                            <td>
                                <p style="font-weight:600;font-size:14px;margin-bottom:8px;">예매완료</p>
                                <a th:href="@{/mypage/reservation-detail}" class="btn btn-outline-gray btn-sm">취소</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>
<th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>
</html>
