<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<body>
<!--
  사용법: th:replace="~{fragments/mypage-sidebar :: sidebar(sidebarActive='mypage')}"
  sidebarActive: mypage / reservations / coupons / waitlist / profile / address / survey
-->
<aside class="sidebar" th:fragment="sidebar(sidebarActive)">
    <div class="sidebar-group">
        <p class="sidebar-group-label">관람 내역</p>
        <a th:href="@{/mypage}" th:classappend="${sidebarActive == 'mypage'} ? 'active'">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            나의 관람 공연
        </a>
        <a th:href="@{/mypage/reservations}" th:classappend="${sidebarActive == 'reservations'} ? 'active'">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            예매/취소 내역
        </a>
        <a th:href="@{/mypage/waitlist}" th:classappend="${sidebarActive == 'waitlist'} ? 'active'">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
            </svg>
            예매대기 신청 내역
        </a>
        <a th:href="@{/mypage/coupons}" th:classappend="${sidebarActive == 'coupons'} ? 'active'">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
                <line x1="7" y1="7" x2="7.01" y2="7"/>
            </svg>
            할인쿠폰/예매권
        </a>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-group">
        <p class="sidebar-group-label">계정 설정</p>
        <a th:href="@{/mypage/profile}" th:classappend="${sidebarActive == 'profile'} ? 'active'">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
            기본정보관리
        </a>
        <a th:href="@{/mypage/address}" th:classappend="${sidebarActive == 'address'} ? 'active'">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                <circle cx="12" cy="10" r="3"/>
            </svg>
            배송지관리
        </a>
        <a th:href="@{/mypage/survey}" th:classappend="${sidebarActive == 'survey'} ? 'active'">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
            취향 설정
        </a>
    </div>
</aside>
</body>
</html>
