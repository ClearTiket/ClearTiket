server:
  port: 8080

spring:
  application:
    name: ClearTicket

  config:
    import: optional:classpath:config.yaml

  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

  thymeleaf:
    cache: false

  web:
    resources:
      cache:
        period: 0

  mail:
    host: smtp.gmail.com
    port: 587
    username: tjoeun.jr5@gmail.com
    # 아래 password 값을 Gmail 앱 비밀번호 16자리로 교체하세요.
    # 앱 비밀번호 발급:
    #   Google 계정 → 보안 → 2단계 인증 활성화 →
    #   앱 비밀번호 → "기타(직접 입력)" 선택 → 생성된 16자리 복사
    password: akdq wcwe vcug titm
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  datasource:
    url: jdbc:postgresql://localhost:5432/clearticket
    username: ${db.username}
    password: ${db.password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  jpa:
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  sql:
    init:
      data-locations: classpath:sql/data.sql
      mode: always

# 세션 타임아웃 30분 (비활동 시 자동 로그아웃)