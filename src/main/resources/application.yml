server:
  port: 8080

spring:
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${mail.username}
    # 아래 password 값을 Gmail 앱 비밀번호 16자리로 교체하세요.
    # 앱 비밀번호 발급:
    #   Google 계정 → 보안 → 2단계 인증 활성화 →
    #   앱 비밀번호 → "기타(직접 입력)" 선택 → 생성된 16자리 복사
    password: ${mail.password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  thymeleaf:
    cache: false
  application:
    name: ClearTicket
  config:
    import: optional:file:./config.yml
  datasource:
    url: jdbc:postgresql://localhost:5432/clearticket
    username: ${db.username}
    password: ${db.password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000
  elasticsearch:
    uris: http://localhost:9200
  jpa:
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      data-locations:
        - "classpath:sql/data.sql"
        - "classpath:sql/venues_20260622.sql"
        - "classpath:sql/performances_20260622.sql"
        - "classpath:sql/schedules_20260622.sql"
lemonsqueezy:
  api-key: ${LEMON_SQUEEZY_API_KEY}
  store-id: "410829"
  variant-id: "1806370"


# 세션 타임아웃 30분 (비활동 시 자동 로그아웃)

